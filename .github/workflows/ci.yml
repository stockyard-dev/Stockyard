name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o stockyard ./cmd/stockyard/

      - name: Test
        run: go test ./internal/license/ ./internal/storage/ ./internal/engine/ ./internal/proxy/ -count=1 -timeout 120s -v

      - name: Vet
        run: go vet ./cmd/stockyard/ ./internal/license/ ./internal/storage/ ./internal/provider/ ./internal/engine/ ./internal/proxy/

  bench:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run benchmarks
        run: |
          go test ./internal/proxy/ -bench=. -benchmem -count=3 -timeout 120s | tee bench.txt
          echo "--- Summary ---"
          grep "^Benchmark" bench.txt | head -20

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.txt

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run smoke tests
        run: bash test/smoke_test.sh

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stockyard:latest .

      - name: Smoke test
        run: |
          docker run -d --name sy-test -p 4200:4200 stockyard:latest
          sleep 5
          curl -sf http://localhost:4200/health | grep '"status":"ok"'
          docker stop sy-test

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
