name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -o stockyard ./cmd/stockyard/

      - name: Run tests
        run: go test ./internal/license/ ./internal/storage/ -count=1 -timeout 120s -v

      - name: Verify binary starts
        run: |
          timeout 5 ./stockyard &
          sleep 2
          curl -sf http://localhost:4200/health | grep -q '"status":"ok"'
          echo "✓ Health check passed"

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stockyard:test .

      - name: Test Docker image
        run: |
          docker run -d --name sy-test -p 4200:4200 stockyard:test
          sleep 3
          curl -sf http://localhost:4200/health | grep -q '"status":"ok"'
          echo "✓ Docker health check passed"
          docker stop sy-test
