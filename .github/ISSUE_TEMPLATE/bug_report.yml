name: Bug Report
description: Report a bug in Stockyard
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Start stockyard with `stockyard`
        2. Send request: `curl ...`
        3. See error in logs
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: "Paste output of `stockyard doctor --json`"
      render: json
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Binary (curl install)
        - Docker
        - Go build from source
        - Homebrew
  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "e.g. macOS 14 arm64, Ubuntu 22.04 amd64"
