version: 2.1
jobs:
  llm-tests:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - run:
          name: Start Stockyard MockLLM
          command: |
            curl -fsSL https://stockyard.dev/install.sh | sh
            stockyard --product mockllm &
          background: true
      - run:
          name: Wait for proxy
          command: sleep 3
      - run:
          name: Run tests
          environment:
            OPENAI_API_BASE: http://localhost:4000/v1
          command: npm test
