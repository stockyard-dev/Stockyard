name: stockyard-hallucicheck
display_name: "Stockyard HalluciCheck"
description: "Validate URLs, emails, and citations in LLM responses. Flag or retry when models invent non-existent references."
icon: "🔍"
command: npx
args:
  - "@stockyard/mcp-hallucicheck"
env:
  OPENAI_API_KEY:
    description: "OpenAI API key"
    required: true
    secret: true
tags:
  - hallucination
  - validation
  - urls
  - fact-check
  - quality
