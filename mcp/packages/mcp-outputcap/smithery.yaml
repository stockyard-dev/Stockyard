name: stockyard-outputcap
display_name: "Stockyard OutputCap"
description: "Cap output length at natural sentence boundaries. No more 500-token essays when you asked for one word."
icon: "📏"
command: npx
args:
  - "@stockyard/mcp-outputcap"
env:
  OPENAI_API_KEY:
    description: "OpenAI API key"
    required: true
    secret: true
tags:
  - output
  - length
  - cap
  - cost
  - truncation
