name: stockyard-codefence
display_name: "Stockyard CodeFence"
description: "Scan LLM code output for dangerous patterns: shell injection, file access, crypto mining. Block or flag unsafe code."
icon: "🔒"
command: npx
args:
  - "@stockyard/mcp-codefence"
env:
  OPENAI_API_KEY:
    description: "OpenAI API key"
    required: true
    secret: true
tags:
  - code
  - security
  - validation
  - sandbox
  - patterns
