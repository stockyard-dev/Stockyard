name: stockyard-promptlint
display_name: "Stockyard PromptLint"
description: "Static analysis for prompts: detect redundancy, injection patterns, excessive length. Score and suggest improvements."
icon: "🔎"
command: npx
args:
  - "@stockyard/mcp-promptlint"
env:
  OPENAI_API_KEY:
    description: "OpenAI API key"
    required: true
    secret: true
tags:
  - prompt
  - lint
  - analysis
  - quality
  - patterns
