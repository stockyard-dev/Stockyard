name: stockyard-agegate
display_name: "Stockyard AgeGate"
description: "Age-appropriate content filtering. Tiers: child, teen, adult. Injects safety prompts, filters output. COPPA/KOSA ready."
icon: "👶"
command: npx
args:
  - "@stockyard/mcp-agegate"
env:
  OPENAI_API_KEY:
    description: "OpenAI API key"
    required: true
    secret: true
tags:
  - child-safety
  - age
  - coppa
  - filter
  - content
