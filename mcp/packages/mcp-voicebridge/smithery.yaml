name: stockyard-voicebridge
display_name: "Stockyard VoiceBridge"
description: "Strip markdown, URLs, code blocks from responses. Convert to speakable prose for voice assistants."
icon: "🎙️"
command: npx
args:
  - "@stockyard/mcp-voicebridge"
env:
  OPENAI_API_KEY:
    description: "OpenAI API key"
    required: true
    secret: true
tags:
  - voice
  - tts
  - speech
  - markdown
  - cleanup
