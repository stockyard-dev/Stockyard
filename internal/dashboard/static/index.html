<!DOCTYPE html>
<html lang="en" data-theme="dark" data-product="__PRODUCT__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PRODUCT_NAME__ Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import{h,render}from'https://esm.sh/preact@10.19.3';import{useState,useEffect,useCallback}from'https://esm.sh/preact@10.19.3/hooks';import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

// ─── Config ────────────────────────────────────────────────────────────
const APPS={
  overview:{id:'overview',name:'Overview',icon:'\u25A3',desc:'System status and health'},
  proxy:{id:'proxy',name:'Proxy',icon:'\u25C8',desc:'Middleware chain & providers',accent:'#06B6D4',
    tabs:['modules','providers','routes'],
    endpoints:{modules:'/api/proxy/modules',providers:'/api/proxy/providers',routes:'/api/proxy/routes',status:'/api/proxy/status'}},
  observe:{id:'observe',name:'Observe',icon:'\u25CE',desc:'Traces, costs & anomalies',accent:'#F59E0B',
    tabs:['traces','costs','alerts','anomalies'],
    endpoints:{overview:'/api/observe/overview',traces:'/api/observe/traces',costs:'/api/observe/costs',daily:'/api/observe/costs/daily',alerts:'/api/observe/alerts',anomalies:'/api/observe/anomalies'}},
  trust:{id:'trust',name:'Trust',icon:'\u2B21',desc:'Audit ledger & compliance',accent:'#10B981',
    tabs:['ledger','evidence','policies'],
    endpoints:{ledger:'/api/trust/ledger',verify:'/api/trust/ledger/verify',evidence:'/api/trust/evidence',policies:'/api/trust/policies',status:'/api/trust/status'}},
  studio:{id:'studio',name:'Studio',icon:'\u25C7',desc:'Prompts, experiments & benchmarks',accent:'#A78BFA',
    tabs:['templates','experiments','benchmarks','snapshots'],
    endpoints:{templates:'/api/studio/templates',experiments:'/api/studio/experiments',benchmarks:'/api/studio/benchmarks',snapshots:'/api/studio/snapshots',status:'/api/studio/status'}},
  forge:{id:'forge',name:'Forge',icon:'\u2B22',desc:'Workflows, tools & sessions',accent:'#F43F5E',
    tabs:['workflows','runs','tools','sessions'],
    endpoints:{workflows:'/api/forge/workflows',runs:'/api/forge/runs',tools:'/api/forge/tools',sessions:'/api/forge/sessions',batch:'/api/forge/batch',status:'/api/forge/status'}},
  exchange:{id:'exchange',name:'Exchange',icon:'\u21C4',desc:'Packs, environments & sync',accent:'#3B82F6',
    tabs:['packs','installed','environments'],
    endpoints:{packs:'/api/exchange/packs',installed:'/api/exchange/installed',environments:'/api/exchange/environments',synclog:'/api/exchange/sync-log',status:'/api/exchange/status'}},
};
const APP_ORDER=['overview','proxy','observe','trust','studio','forge','exchange'];

async function api(path){try{const r=await fetch(path);if(!r.ok)return{_error:r.status};return await r.json()}catch(e){return{_error:e.message}}}

const fmt={
  usd:v=>v==null?'\u2014':v<0.01&&v>0?'$'+v.toFixed(4):'$'+v.toFixed(2),
  num:v=>v==null?'\u2014':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(v),
  ms:v=>v==null?'\u2014':v>=1000?(v/1000).toFixed(1)+'s':Math.round(v)+'ms',
  ago:ts=>{if(!ts)return'\u2014';const s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'},
  trunc:(s,n=60)=>s&&s.length>n?s.substring(0,n)+'\u2026':s||'\u2014',
  hash:s=>s?s.substring(0,12)+'\u2026':'\u2014',
};

// ─── Shared components ─────────────────────────────────────────────────
function Stat({label,value,sub,accent}){
  return html`<div class="stat"><div class="stat-label">${label}</div><div class="stat-value ${accent?'accent':''}">${value}</div>${sub&&html`<div class="stat-sub">${sub}</div>`}</div>`;
}

function Badge({text,variant}){return html`<span class="badge ${variant||''}">${text}</span>`}

function TabBar({tabs,active,onChange}){
  return html`<div class="tab-bar">${tabs.map(t=>html`<button key=${t} class="tab ${active===t?'active':''}" onClick=${()=>onChange(t)}>${t}</button>`)}</div>`;
}

function DataTable({columns,rows,emptyMsg}){
  if(!rows||rows.length===0)return html`<div class="empty-state">${emptyMsg||'No data yet'}</div>`;
  const gc=columns.map(c=>c.width||'1fr').join(' ');
  return html`<div class="data-table">
    <div class="dt-head" style="grid-template-columns:${gc}">${columns.map(c=>html`<span key=${c.key}>${c.label}</span>`)}</div>
    <div class="dt-body">${rows.map((row,i)=>html`<div key=${row.id||i} class="dt-row" style="grid-template-columns:${gc}">
      ${columns.map(c=>html`<span key=${c.key} class="${c.mono?'mono':''} ${c.accent?'dt-accent':''}">${c.render?c.render(row):row[c.key]||'\u2014'}</span>`)}
    </div>`)}</div>
  </div>`;
}

// ─── Overview ──────────────────────────────────────────────────────────
function OverviewView(){
  const[apps,setApps]=useState(null);
  const[stats,setStats]=useState({});
  useEffect(()=>{(async()=>{
    const a=await api('/api/apps');setApps(a.apps||[]);
    const st={};
    for(const id of['proxy','observe','trust','studio','forge','exchange']){
      const ep=APPS[id]?.endpoints?.status;if(ep)st[id]=await api(ep);
    }
    setStats(st);
  })()},[]);
  if(!apps)return html`<div class="loading">Loading\u2026</div>`;
  return html`
    <div class="page-header"><h2>System Overview</h2><span class="page-sub">All 6 apps \u2022 single binary</span></div>
    <div class="stats-row">
      <${Stat} label="Apps" value=${apps.length} accent/>
      <${Stat} label="Endpoints" value="69"/>
      <${Stat} label="Middleware" value="134"/>
      <${Stat} label="Status" value="Operational" accent/>
    </div>
    <div class="app-grid">${apps.map(a=>{const cfg=APPS[a.name];const st=stats[a.name]||{};
      return html`<div key=${a.name} class="app-card" style="--card-accent:${cfg?.accent||'#a1a1aa'}">
        <div class="app-card-head"><span class="app-card-icon">${cfg?.icon||'\u25C6'}</span><span class="app-card-name">${a.name}</span><${Badge} text=${st._error?'error':'live'} variant=${st._error?'danger':'success'}/></div>
        <div class="app-card-desc">${a.description}</div>
        <div class="app-card-api mono">${a.api}</div>
      </div>`})}</div>`;
}

// ─── View map ──────────────────────────────────────────────────────────
const VIEWS={overview:OverviewView,proxy:ProxyView,observe:ObserveView,trust:TrustView,studio:StudioView,forge:ForgeView,exchange:ExchangeView};

// ─── App shell ─────────────────────────────────────────────────────────
function App(){
  const[active,setActive]=useState('overview');
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('sy-theme')||'dark'}catch{return'dark'}});
  useEffect(()=>{document.documentElement.dataset.theme=theme;try{localStorage.setItem('sy-theme',theme)}catch{}},[theme]);
  const View=VIEWS[active]||OverviewView;

  return html`<div class="shell">
    <nav class="nav">
      <div class="nav-brand" onClick=${()=>setActive('overview')}>
        <div class="nav-logo">SY</div>
        <span class="nav-title">Stockyard</span>
      </div>
      <div class="nav-section">Apps</div>
      ${APP_ORDER.map(id=>{const a=APPS[id];return html`
        <button key=${id} class="nav-item ${active===id?'active':''}" onClick=${()=>setActive(id)} style="${active===id&&a.accent?'--item-accent:'+a.accent:''}">
          <span class="nav-icon">${a.icon}</span><span class="nav-label">${a.name}</span>
          ${active===id&&html`<span class="nav-active-mark"></span>`}
        </button>`})}
      <div class="nav-spacer"></div>
      <div class="nav-section">System</div>
      <a class="nav-item" href="/api/apps" target="_blank"><span class="nav-icon">{}</span><span class="nav-label">API</span></a>
      <button class="nav-item" onClick=${()=>setTheme(t=>t==='dark'?'light':'dark')}><span class="nav-icon">${theme==='dark'?'\u25D0':'\u25D1'}</span><span class="nav-label">${theme==='dark'?'Dark':'Light'}</span></button>
      <div class="nav-footer"><span class="nav-version">v1.0 \u00B7 6 apps \u00B7 69 endpoints</span></div>
    </nav>
    <main class="content"><${View} key=${active}/></main>
  </div>`;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
<style>
