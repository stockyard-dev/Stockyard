<!DOCTYPE html>
<html lang="en" data-theme="dark" data-product="__PRODUCT__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PRODUCT_NAME__ Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import{h,render}from'https://esm.sh/preact@10.19.3';import{useState,useEffect,useRef,useCallback}from'https://esm.sh/preact@10.19.3/hooks';import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

const PRODUCTS={
  costcap:{name:'CostCap',icon:'$',badge:'FREE'},
  llmcache:{name:'CacheLayer',icon:'\u26A1',badge:'FREE'},
  jsonguard:{name:'StructuredShield',icon:'\u2713',badge:'FREE'},
  routefall:{name:'FallbackRouter',icon:'\u21C4',badge:'FREE'},
  rateshield:{name:'RateShield',icon:'\u2298',badge:'FREE'},
  promptreplay:{name:'PromptReplay',icon:'\u25B6',badge:'FREE'},
  llmkit:{name:'LLMKit',icon:'\u25C6',badge:'SUITE'}
};
const PK=document.documentElement.dataset.product||'costcap';
const P=PRODUCTS[PK]||PRODUCTS.costcap;

async function api(p){try{const r=await fetch('/api'+p);if(!r.ok)return null;return await r.json()}catch{return null}}

function useSSE(onEvent){
  const[connected,setConnected]=useState(false);
  const cb=useRef(onEvent);cb.current=onEvent;
  useEffect(()=>{
    let es,rt;
    function connect(){
      es=new EventSource('/ui/events');
      es.onopen=()=>setConnected(true);
      es.onmessage=(e)=>{try{cb.current(JSON.parse(e.data))}catch{}};
      es.onerror=()=>{setConnected(false);es.close();rt=setTimeout(connect,3000)};
    }
    connect();
    return()=>{es&&es.close();clearTimeout(rt)};
  },[]);
  return connected;
}

function useTheme(){
  const[theme,set]=useState(()=>localStorage.getItem('llmkit-theme')||'dark');
  const apply=useCallback(t=>{document.documentElement.dataset.theme=t;localStorage.setItem('llmkit-theme',t);set(t)},[]);
  useEffect(()=>{document.documentElement.dataset.theme=theme},[]);
  return{theme,toggle:useCallback(()=>apply(theme==='dark'?'light':'dark'),[theme,apply])};
}

const fmt={
  usd:v=>v<0.01?'$'+v.toFixed(4):'$'+v.toFixed(2),
  compact:v=>v>=1000?(v/1000).toFixed(1)+'K':String(v),
  ms:v=>v>=1000?(v/1000).toFixed(1)+'s':v+'ms',
  pct:(v,t)=>t>0?Math.round(v/t*100)+'%':'0%',
  time:ts=>{if(!ts)return'--:--:--';return new Date(ts).toLocaleTimeString('en-US',{hour12:false})}
};

function StatusDot({active}){return html`<span class="status-dot ${active?'active':''}"></span>`}

function MetricCard({label,value,sub,progress,accent}){
  return html`<div class="metric-card">
    <div class="metric-label">${label}</div>
    <div class="metric-value ${accent?'accent':''}">${value}</div>
    ${sub&&html`<div class="metric-sub">${sub}</div>`}
    ${progress&&html`<div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill ${progress.pct>90?'danger':progress.pct>70?'warn':''}" style="width:${Math.min(progress.pct,100)}%"></div></div>
      <div class="progress-labels"><span>${progress.min}</span><span>${progress.max}</span></div>
    </div>`}
  </div>`;
}

function BarChart({data,label:cl}){
  if(!data||!data.length)return null;
  const mx=Math.max(...data.map(d=>d.value),0.01);
  return html`<div class="card">
    <div class="card-header"><span class="card-title">${cl}</span><span class="card-action">Export \u2197</span></div>
    <div class="bar-chart">${data.map((d,i)=>html`<div class="bar-group" key=${i}>
      <div class="bar ${d.highlight?'today':''}" style="height:${Math.max(d.value/mx*100,3)}%"><span class="bar-tooltip">${fmt.usd(d.value)}</span></div>
      <span class="bar-label" style="${d.highlight?'color:var(--accent);font-weight:600':''}}">${d.label}</span>
    </div>`)}</div>
  </div>`;
}

function ModelBreakdown({models}){
  if(!models||!models.length)return null;
  const total=models.reduce((s,m)=>s+m.cost,0);
  return html`<div class="card">
    <div class="card-header"><span class="card-title">Top Models by Cost</span><span class="card-action">This month \u25BE</span></div>
    <div class="model-list">
      ${models.map(m=>html`<div class="model-row" key=${m.name}>
        <div class="model-info"><span class="model-name">${m.name}</span><span class="model-cost">${fmt.usd(m.cost)} <span class="model-percent">${fmt.pct(m.cost,total)}</span></span></div>
        <div class="model-bar"><div class="model-bar-fill" style="width:${total>0?m.cost/total*100:0}%"></div></div>
      </div>`)}
      <div class="model-row" style="margin-top:6px;padding-top:12px;border-top:1px solid var(--border-subtle)">
        <div class="model-info"><span class="model-name" style="color:var(--text-tertiary);font-weight:400">Total</span><span class="model-cost" style="color:var(--text-primary);font-weight:700">${fmt.usd(total)}</span></div>
      </div>
    </div>
  </div>`;
}

function LogTable({rows}){
  return html`<div class="log-card">
    <div class="log-header">
      <span class="log-title"><span class="live-dot"></span>Recent Requests</span>
      <div class="log-search"><span class="log-search-icon">\u2315</span><input type="text" placeholder="Search requests..."/></div>
    </div>
    <div class="log-table">
      <div class="log-table-head"><span>Time</span><span>Prompt</span><span>Model</span><span>Tokens</span><span>Latency</span><span>Cost</span></div>
      <div class="log-rows">
        ${rows.map((r,i)=>html`<div class="log-row ${i===0?'new':''}" key=${r.id||i}>
          <span class="log-time">${fmt.time(r.timestamp)}</span>
          <span class="log-prompt">${r.prompt||'\u2014'}</span>
          <span class="log-model">${r.model||'\u2014'}</span>
          <span class="log-tokens">${r.tokens_in||0} \u2192 ${r.tokens_out||0}</span>
          <span class="log-latency">${fmt.ms(r.latency_ms||0)}</span>
          <span class="log-cost">${fmt.usd(r.cost_usd||0)}</span>
        </div>`)}
        ${rows.length===0&&html`<div class="log-empty">No requests yet. Point your app at this proxy to get started.</div>`}
      </div>
    </div>
  </div>`;
}

function Sidebar({theme,onThemeToggle,connected,activeView,onNavigate}){
  const navItems={
    costcap:[{id:'overview',icon:'\u25C9',label:'Overview'},{id:'projects',icon:'\u229E',label:'Projects'},{id:'logs',icon:'\u2261',label:'Request Log'}],
    llmcache:[{id:'overview',icon:'\u25C9',label:'Overview'},{id:'entries',icon:'\u229E',label:'Cache Entries'},{id:'logs',icon:'\u2261',label:'Request Log'}],
    jsonguard:[{id:'overview',icon:'\u25C9',label:'Overview'},{id:'schemas',icon:'\u229E',label:'Schemas'},{id:'logs',icon:'\u2261',label:'Failures'}],
    routefall:[{id:'overview',icon:'\u25C9',label:'Overview'},{id:'health',icon:'\u2665',label:'Provider Health'},{id:'logs',icon:'\u2261',label:'Events'}],
    rateshield:[{id:'overview',icon:'\u25C9',label:'Overview'},{id:'rules',icon:'\u229E',label:'Rate Rules'},{id:'logs',icon:'\u2261',label:'Events'}],
    promptreplay:[{id:'overview',icon:'\u25C9',label:'All Requests'},{id:'replay',icon:'\u25B6',label:'Replay'}],
    llmkit:[{id:'overview',icon:'\u25C9',label:'Overview'},{id:'spend',icon:'$',label:'Spend'},{id:'cache',icon:'\u26A1',label:'Cache'},{id:'routing',icon:'\u21C4',label:'Routing'},{id:'logs',icon:'\u2261',label:'Request Log'}]
  };
  const items=navItems[PK]||navItems.costcap;
  return html`<nav class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">${P.icon}</div>
      <span class="sidebar-brand-name">${P.name}</span>
      <span class="sidebar-brand-badge">${P.badge}</span>
    </div>
    <div class="sidebar-section-label">Dashboard</div>
    ${items.map(item=>html`<a key=${item.id} class="sidebar-item ${activeView===item.id?'active':''}" onClick=${()=>onNavigate(item.id)}>
      <span class="sidebar-item-icon">${item.icon}</span>${item.label}
      ${item.id==='overview'&&html`<${StatusDot} active=${connected}/>`}
    </a>`)}
    <div class="sidebar-section-label">Configure</div>
    <a class="sidebar-item" onClick=${()=>onNavigate('providers')}><span class="sidebar-item-icon">\u2B21</span>Providers</a>
    <a class="sidebar-item" onClick=${()=>onNavigate('settings')}><span class="sidebar-item-icon">\u2699</span>Settings</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <div class="theme-toggle" onClick=${onThemeToggle}>
        <span class="sidebar-item-icon">${theme==='dark'?'\u263E':'\u2600'}</span>
        <span>${theme==='dark'?'Dark mode':'Light mode'}</span>
        <div class="theme-toggle-track"><div class="theme-toggle-thumb"></div></div>
      </div>
      <a class="sidebar-item" style="margin-top:4px" href="https://llmkit.dev/docs" target="_blank"><span class="sidebar-item-icon">?</span>Docs</a>
    </div>
  </nav>`;
}

function CostCapOverview({spend,logs,history,models}){
  const td=spend.today||0,mo=spend.month||0,dc=spend.dailyCap||5,mc=spend.monthlyCap||100;
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Today'];
  const chart=(history||[]).length>0?history.slice(-7).map((d,i,a)=>({label:i===a.length-1?'Today':new Date(d.date).toLocaleDateString('en-US',{weekday:'short'}),value:d.cost||0,highlight:i===a.length-1})):days.map((d,i)=>({label:d,value:i===days.length-1?td:Math.random()*td*1.5,highlight:i===days.length-1}));
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Today's Spend" value=${fmt.usd(td)} accent progress=${{pct:dc>0?td/dc*100:0,min:'$0',max:'cap: '+fmt.usd(dc)}}/>
      <${MetricCard} label="This Month" value=${fmt.usd(mo)} progress=${{pct:mc>0?mo/mc*100:0,min:'$0',max:'cap: '+fmt.usd(mc)}}/>
      <${MetricCard} label="Requests Today" value=${fmt.compact(logs.length)} sub=${logs.length>0?'avg '+fmt.usd(td/logs.length)+'/req':'waiting for requests...'}/>
    </div>
    <div class="content-grid">
      <${BarChart} data=${chart} label="Daily Spend \u2014 Last 7 Days"/>
      <${ModelBreakdown} models=${models}/>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function CacheOverview({cacheStats,logs}){
  const hr=cacheStats.hitRate||0,sv=cacheStats.costSaved||0,en=cacheStats.entries||0;
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Cache Hit Rate" value=${hr+'%'} accent progress=${{pct:hr,min:'0%',max:'100%'}}/>
      <${MetricCard} label="Cost Saved" value=${fmt.usd(sv)} sub="this month"/>
      <${MetricCard} label="Cache Entries" value=${fmt.compact(en)} sub=${(cacheStats.sizeMB||0)+' MB'}/>
    </div>
    <div class="content-grid">
      <div class="card"><div class="card-header"><span class="card-title">Latency Comparison</span></div>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:8px">
          <div><div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:6px"><span class="model-name">Uncached</span><span class="model-cost">${fmt.ms(cacheStats.avgLatencyMiss||1240)}</span></div><div class="model-bar"><div class="model-bar-fill" style="width:100%;opacity:0.4"></div></div></div>
          <div><div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:6px"><span class="model-name">Cached</span><span class="model-cost" style="color:var(--accent)">${fmt.ms(cacheStats.avgLatencyHit||48)}</span></div><div class="model-bar"><div class="model-bar-fill" style="width:${Math.max(4,(cacheStats.avgLatencyHit||48)/(cacheStats.avgLatencyMiss||1240)*100)}%"></div></div></div>
        </div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Cache Info</span><span class="card-action" onClick=${()=>fetch('/api/cache',{method:'DELETE'})}>Clear Cache</span></div>
        <div class="model-list">
          <div class="model-row"><div class="model-info"><span class="model-name" style="font-family:var(--font-body)">Entries</span><span class="model-cost">${fmt.compact(en)}</span></div></div>
          <div class="model-row"><div class="model-info"><span class="model-name" style="font-family:var(--font-body)">Strategy</span><span class="model-cost">exact-match</span></div></div>
          <div class="model-row"><div class="model-info"><span class="model-name" style="font-family:var(--font-body)">TTL</span><span class="model-cost">1 hour</span></div></div>
        </div>
      </div>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function ShieldOverview({spend,logs}){
  const total=logs.length||0;
  const passed=logs.filter(r=>r.status===200).length;
  const retried=logs.filter(r=>r.validation_retries>0).length;
  const failed=total-passed;
  const passRate=total>0?Math.round(passed/total*100):100;
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Pass Rate" value=${passRate+'%'} accent progress=${{pct:passRate,min:'0%',max:'100%'}}/>
      <${MetricCard} label="Auto-Fixed" value=${String(retried)} sub="retries that saved the day"/>
      <${MetricCard} label="Hard Failures" value=${String(failed)} sub=${total>0?fmt.pct(failed,total)+' of requests':'no failures yet'}/>
    </div>
    <div class="content-grid">
      <div class="card"><div class="card-header"><span class="card-title">Validation Over Time</span></div>
        <div style="display:flex;align-items:center;justify-content:center;height:140px;color:var(--text-tertiary);font-size:0.85rem">Chart updates with live data</div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Schema Stats</span><span class="card-action">Manage \u2197</span></div>
        <div class="model-list">
          <div class="model-row"><div class="model-info"><span class="model-name" style="font-family:var(--font-body)">Total Validated</span><span class="model-cost">${fmt.compact(total)}</span></div></div>
          <div class="model-row"><div class="model-info"><span class="model-name" style="font-family:var(--font-body)">Pass Rate</span><span class="model-cost" style="color:var(--accent)">${passRate}%</span></div></div>
          <div class="model-row"><div class="model-info"><span class="model-name" style="font-family:var(--font-body)">Retry Success</span><span class="model-cost">${retried>0?Math.round(retried/(retried+failed)*100):100}%</span></div></div>
        </div>
      </div>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function RouterOverview({spend,logs}){
  const total=logs.length||0;
  const failovers=logs.filter(r=>r.failover_used).length;
  const uptime=total>0?((total-failovers)/total*100).toFixed(2):'100.00';
  const providerCounts={};
  logs.forEach(r=>{const p=r.provider||'unknown';providerCounts[p]=(providerCounts[p]||0)+1});
  const providers=Object.entries(providerCounts).map(([n,c])=>({name:n,count:c})).sort((a,b)=>b.count-a.count);
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Effective Uptime" value=${uptime+'%'} accent/>
      <${MetricCard} label="Failovers Today" value=${String(failovers)} sub=${failovers>0?'provider switches':'all providers healthy'}/>
      <${MetricCard} label="Total Requests" value=${fmt.compact(total)}/>
    </div>
    <div class="content-grid">
      <div class="card"><div class="card-header"><span class="card-title">Provider Health</span></div>
        <div class="model-list">
          ${['openai','anthropic','groq','gemini'].map(p=>html`<div class="model-row" key=${p}>
            <div class="model-info"><span class="model-name"><span style="margin-right:8px">\u{1F7E2}</span>${p}</span><span class="model-cost">healthy</span></div>
          </div>`)}
        </div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Traffic Distribution</span></div>
        <div class="model-list">
          ${providers.map(p=>html`<div class="model-row" key=${p.name}>
            <div class="model-info"><span class="model-name">${p.name}</span><span class="model-cost">${fmt.pct(p.count,total)}</span></div>
            <div class="model-bar"><div class="model-bar-fill" style="width:${total>0?p.count/total*100:0}%"></div></div>
          </div>`)}
          ${providers.length===0&&html`<div style="color:var(--text-tertiary);font-size:0.85rem;padding:12px 0">No traffic yet</div>`}
        </div>
      </div>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function RateShieldOverview({spend,logs}){
  const total=logs.length||0;
  const throttled=logs.filter(r=>r.status===429).length;
  const blocked=logs.filter(r=>r.status===403).length;
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Requests/min" value=${fmt.compact(Math.round(total/Math.max(1,1)))} accent sub=${fmt.compact(total)+'/hr'}/>
      <${MetricCard} label="Throttled" value=${String(throttled)} sub=${throttled>0?'today':'no throttling yet'}/>
      <${MetricCard} label="Blocked" value=${String(blocked)} sub=${blocked>0?'abuse detected':'all clear'}/>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function ReplayOverview({logs}){
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Logged Requests" value=${fmt.compact(logs.length)} accent/>
      <${MetricCard} label="Models Used" value=${String(new Set(logs.map(r=>r.model)).size)}/>
      <${MetricCard} label="Total Cost" value=${fmt.usd(logs.reduce((s,r)=>s+(r.cost_usd||0),0))}/>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function SuiteOverview({spend,logs,history,models,cacheStats}){
  const[tab,setTab]=useState('overview');
  const tabs=['overview','spend','cache','routing','logs'];
  if(tab==='spend')return html`<${CostCapOverview} spend=${spend} logs=${logs} history=${history} models=${models}/>`;
  if(tab==='cache')return html`<${CacheOverview} cacheStats=${cacheStats} logs=${logs}/>`;
  if(tab==='routing')return html`<${RouterOverview} spend=${spend} logs=${logs}/>`;
  if(tab==='logs')return html`<${LogTable} rows=${logs}/>`;
  const td=spend.today||0,hr=cacheStats.hitRate||0;
  return html`
    <div class="tab-bar">${tabs.map(t=>html`<button key=${t} class="tab-btn ${tab===t?'active':''}" onClick=${()=>setTab(t)}>${t.charAt(0).toUpperCase()+t.slice(1)}</button>`)}</div>
    <div class="metrics-row">
      <${MetricCard} label="Today's Spend" value=${fmt.usd(td)} accent/>
      <${MetricCard} label="Cache Hit Rate" value=${hr+'%'}/>
      <${MetricCard} label="Total Requests" value=${fmt.compact(logs.length)}/>
    </div>
    <div class="content-grid">
      <${BarChart} data=${(history||[]).slice(-7).map((d,i,a)=>({label:i===a.length-1?'Today':new Date(d.date).toLocaleDateString('en-US',{weekday:'short'}),value:d.cost||0,highlight:i===a.length-1}))} label="Daily Spend"/>
      <${ModelBreakdown} models=${models}/>
    </div>
    <${LogTable} rows=${logs.slice(0,10)}/>`;
}

function GenericOverview({spend,logs}){
  return html`
    <div class="metrics-row">
      <${MetricCard} label="Today's Spend" value=${fmt.usd(spend.today||0)} accent/>
      <${MetricCard} label="This Month" value=${fmt.usd(spend.month||0)}/>
      <${MetricCard} label="Total Requests" value=${fmt.compact(logs.length)}/>
    </div>
    <${LogTable} rows=${logs}/>`;
}

function App(){
  const{theme,toggle}=useTheme();
  const[view,setView]=useState('overview');
  const[spend,setSpend]=useState({today:0,month:0,dailyCap:5,monthlyCap:100});
  const[logs,setLogs]=useState([]);
  const[history,setHistory]=useState([]);
  const[models,setModels]=useState([]);
  const[cacheStats,setCache]=useState({});
  const[project,setProject]=useState('');

  const connected=useSSE(useCallback(ev=>{
    if(ev.type==='request_logged'){
      setLogs(prev=>[{id:ev.id,timestamp:new Date().toISOString(),model:ev.model,tokens_in:ev.tokens||0,tokens_out:0,latency_ms:ev.latency||0,cost_usd:ev.cost||0,cache_hit:ev.cache_hit},...prev].slice(0,100));
    }
    if(ev.type==='spend_update'){
      setSpend(prev=>({...prev,today:ev.today||prev.today,month:ev.month||prev.month}));
    }
  },[]));

  useEffect(()=>{(async()=>{
    const[sd,ld,hd,cd]=await Promise.all([api('/spend'),api('/logs?limit=50'),api('/spend/history?days=7'),api('/cache/stats')]);
    if(sd?.projects){let t=0,m=0;for(const p of Object.values(sd.projects)){t+=p.today||0;m+=p.month||0}setSpend(prev=>({...prev,today:t,month:m}))}
    if(ld?.requests){
      setLogs(ld.requests.map(r=>({id:r.id,timestamp:r.timestamp,model:r.model,prompt:r.request_body?(r.request_body.substring(0,80)+'...'):'',tokens_in:r.tokens_in,tokens_out:r.tokens_out,latency_ms:r.latency_ms,cost_usd:r.cost_usd})));
      const mm={};ld.requests.forEach(r=>{if(!mm[r.model])mm[r.model]=0;mm[r.model]+=r.cost_usd||0});
      setModels(Object.entries(mm).map(([n,c])=>({name:n,cost:c})).sort((a,b)=>b.cost-a.cost).slice(0,5));
    }
    if(hd?.daily)setHistory(hd.daily);
    if(cd)setCache(cd);
  })()},[project]);

  function renderView(){
    if(view==='overview'){
      switch(PK){
        case'costcap':return html`<${CostCapOverview} spend=${spend} logs=${logs} history=${history} models=${models}/>`;
        case'llmcache':return html`<${CacheOverview} cacheStats=${cacheStats} logs=${logs}/>`;
        case'jsonguard':return html`<${ShieldOverview} spend=${spend} logs=${logs}/>`;
        case'routefall':return html`<${RouterOverview} spend=${spend} logs=${logs}/>`;
        case'rateshield':return html`<${RateShieldOverview} spend=${spend} logs=${logs}/>`;
        case'promptreplay':return html`<${ReplayOverview} logs=${logs}/>`;
        case'llmkit':return html`<${SuiteOverview} spend=${spend} logs=${logs} history=${history} models=${models} cacheStats=${cacheStats}/>`;
        default:return html`<${GenericOverview} spend=${spend} logs=${logs}/>`;
      }
    }
    if(view==='logs')return html`<${LogTable} rows=${logs}/>`;
    return html`<div class="card" style="padding:40px;text-align:center;color:var(--text-tertiary)"><p style="font-size:1.1rem;margin-bottom:8px">${view} view</p><p>Coming soon.</p></div>`;
  }

  return html`<div class="app">
    <${Sidebar} theme=${theme} onThemeToggle=${toggle} connected=${connected} activeView=${view} onNavigate=${setView}/>
    <main class="main">
      <div class="main-header">
        <h1 class="main-title">${view==='overview'?'Overview':view.charAt(0).toUpperCase()+view.slice(1)}</h1>
        <div class="connected-badge"><span class="live-dot" style="${!connected?'background:var(--text-tertiary);animation:none':''}"></span>${connected?'Connected':'Connecting...'}</div>
        <select class="project-selector" value=${project} onChange=${e=>setProject(e.target.value)}><option value="">All Projects</option></select>
      </div>
      ${renderView()}
    </main>
  </div>`;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
<style>
:root{--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-body:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;--font-mono:'JetBrains Mono','SF Mono','Fira Code',monospace;--transition:0.2s cubic-bezier(0.4,0,0.2,1);--sidebar-width:220px}
[data-product="costcap"]{--accent:#F59E0B;--accent-soft:#F59E0B22;--accent-mid:#F59E0B44}
[data-product="llmcache"]{--accent:#06B6D4;--accent-soft:#06B6D422;--accent-mid:#06B6D444}
[data-product="jsonguard"]{--accent:#10B981;--accent-soft:#10B98122;--accent-mid:#10B98144}
[data-product="routefall"]{--accent:#8B5CF6;--accent-soft:#8B5CF622;--accent-mid:#8B5CF644}
[data-product="rateshield"]{--accent:#F43F5E;--accent-soft:#F43F5E22;--accent-mid:#F43F5E44}
[data-product="promptreplay"]{--accent:#3B82F6;--accent-soft:#3B82F622;--accent-mid:#3B82F644}
[data-product="llmkit"]{--accent:#A78BFA;--accent-soft:#A78BFA22;--accent-mid:#A78BFA44}
[data-theme="dark"]{--bg-root:#0c0e14;--bg-surface:#141720;--bg-raised:#1a1e2a;--bg-hover:#222738;--bg-input:#1a1e2a;--border:#262b3a;--border-subtle:#1e2232;--text-primary:#f0f1f4;--text-secondary:#8b90a0;--text-tertiary:#5c6178;--text-on-accent:#0c0e14;--success:#34D399;--danger:#FB7185;--warning:#FBBF24;--bar-bg:#1e2232;--shadow-card:0 1px 3px rgba(0,0,0,0.3),0 0 0 1px var(--border-subtle)}
[data-theme="light"]{--bg-root:#f5f5f7;--bg-surface:#ffffff;--bg-raised:#f9fafb;--bg-hover:#f0f1f4;--bg-input:#f5f5f7;--border:#e2e4ea;--border-subtle:#eceef2;--text-primary:#111318;--text-secondary:#5c6178;--text-tertiary:#8b90a0;--text-on-accent:#ffffff;--success:#059669;--danger:#E11D48;--warning:#D97706;--bar-bg:#e8eaef;--shadow-card:0 1px 3px rgba(0,0,0,0.06),0 0 0 1px var(--border-subtle)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--font-body);background:var(--bg-root);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;gap:4px;transition:background var(--transition),border-color var(--transition)}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:4px 10px 16px;border-bottom:1px solid var(--border-subtle);margin-bottom:8px}
.sidebar-brand-icon{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-on-accent);font-weight:700;flex-shrink:0}
.sidebar-brand-name{font-weight:700;font-size:1.05rem;letter-spacing:-0.01em}
.sidebar-brand-badge{font-size:0.65rem;font-weight:600;padding:2px 6px;border-radius:6px;background:var(--accent-soft);color:var(--accent);letter-spacing:0.02em;margin-left:auto}
.sidebar-section-label{font-size:0.7rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;padding:16px 10px 6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all var(--transition);text-decoration:none;position:relative}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar-item.active{background:var(--accent-soft);color:var(--accent)}
.sidebar-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--accent)}
.sidebar-item-icon{width:18px;text-align:center;font-size:0.95rem;flex-shrink:0}
.sidebar-spacer{flex:1}
.sidebar-footer{border-top:1px solid var(--border-subtle);padding-top:12px;margin-top:8px}
.theme-toggle{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.9rem;font-weight:500;color:var(--text-secondary);transition:all var(--transition)}
.theme-toggle:hover{background:var(--bg-hover);color:var(--text-primary)}
.theme-toggle-track{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;margin-left:auto;transition:background var(--transition)}
.theme-toggle-thumb{width:16px;height:16px;border-radius:50%;background:var(--text-primary);position:absolute;top:2px;left:2px;transition:transform var(--transition)}
[data-theme="light"] .theme-toggle-thumb{transform:translateX(16px)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-tertiary);margin-left:auto;flex-shrink:0;position:relative}
.status-dot.active{background:var(--success)}
.status-dot.active::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--success);opacity:0.3;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.5);opacity:0}}
.main{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:24px}
.main-header{display:flex;align-items:center;gap:16px}
.main-title{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em}
.project-selector{margin-left:auto;padding:7px 14px;border-radius:var(--radius-sm);background:var(--bg-surface);border:1px solid var(--border);color:var(--text-primary);font-family:var(--font-body);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all var(--transition)}
.project-selector:hover{border-color:var(--accent)}
.connected-badge{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--success);font-weight:500}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;margin-right:6px;animation:pulse 2s ease-in-out infinite}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.metric-card{background:var(--bg-surface);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-card);transition:all var(--transition);position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity var(--transition)}
.metric-card:hover::before{opacity:1}
.metric-label{font-size:0.75rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.metric-value{font-family:var(--font-mono);font-size:2.2rem;font-weight:700;letter-spacing:-0.03em;line-height:1.1;color:var(--text-primary);transition:color var(--transition)}
.metric-value.accent{color:var(--accent)}
.metric-sub{font-size:0.8rem;color:var(--text-secondary);margin-top:6px;display:flex;align-items:center;gap:6px}
.progress-wrap{margin-top:14px}
.progress-bar{height:8px;border-radius:4px;background:var(--bar-bg);overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--accent);transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.progress-fill.warn{background:var(--warning)}
.progress-fill.danger{background:var(--danger)}
.progress-labels{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:6px}
.content-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.card{background:var(--bg-surface);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-card);transition:all var(--transition)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:0.85rem;font-weight:600;color:var(--text-secondary)}
.card-action{font-size:0.75rem;color:var(--accent);font-weight:500;cursor:pointer;padding:4px 10px;border-radius:6px;transition:background var(--transition)}
.card-action:hover{background:var(--accent-soft)}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:10px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:6px 6px 4px 4px;background:var(--accent);transition:height 0.8s cubic-bezier(0.4,0,0.2,1),opacity var(--transition);min-height:4px;opacity:0.55;position:relative;cursor:pointer}
.bar:hover{opacity:1}
.bar.today{opacity:1}
.bar-label{font-size:0.68rem;color:var(--text-tertiary);font-weight:500}
.bar-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg-raised);border:1px solid var(--border);padding:4px 9px;border-radius:6px;font-family:var(--font-mono);font-size:0.72rem;color:var(--text-primary);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity var(--transition)}
.bar:hover .bar-tooltip{opacity:1}
.model-list{display:flex;flex-direction:column;gap:14px}
.model-row{display:flex;flex-direction:column;gap:6px}
.model-info{display:flex;align-items:center;justify-content:space-between}
.model-name{font-family:var(--font-mono);font-size:0.82rem;font-weight:500;color:var(--text-primary)}

.model-bar{height:6px;border-radius:3px;background:var(--bar-bg);overflow:hidden}

.log-card{background:var(--bg-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);overflow:hidden;transition:all var(--transition)}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px}
.log-title{font-size:0.85rem;font-weight:600;color:var(--text-secondary)}
.log-search{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--radius-sm);background:var(--bg-input);border:1px solid var(--border-subtle);transition:border-color var(--transition)}
.log-search:focus-within{border-color:var(--accent)}
.log-search input{border:none;background:transparent;color:var(--text-primary);font-family:var(--font-body);font-size:0.82rem;outline:none;width:160px}
.log-search input::placeholder{color:var(--text-tertiary)}
.log-search-icon{color:var(--text-tertiary);font-size:0.85rem}
.log-table-head{display:grid;grid-template-columns:90px 1fr 140px 90px 80px 90px;padding:8px 24px;border-bottom:1px solid var(--border-subtle);font-size:0.7rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em}
.log-row{display:grid;grid-template-columns:90px 1fr 140px 90px 80px 90px;padding:11px 24px;border-bottom:1px solid var(--border-subtle);font-size:0.82rem;align-items:center;transition:background var(--transition);cursor:pointer}
.log-row:hover{background:var(--bg-hover)}
.log-row:last-child{border-bottom:none}
.log-time{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-tertiary)}
.log-model{font-family:var(--font-mono);font-size:0.8rem;font-weight:500}
.log-prompt{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px}

.log-latency{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-secondary)}

@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

.tab-btn{padding:7px 16px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-secondary);font-family:var(--font-body);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all var(--transition)}
.tab-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.tab-btn.active{background:var(--accent-soft);color:var(--accent)}
</style>
</head>
