<!DOCTYPE html>
<html lang="en" data-product="__PRODUCT__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PRODUCT_NAME__ Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import{h,render}from'https://esm.sh/preact@10.19.3';import{useState,useEffect,useCallback,useRef}from'https://esm.sh/preact@10.19.3/hooks';import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

const APPS={
  overview:{id:'overview',name:'Overview',icon:'\u25A3',desc:'System status'},
  proxy:{id:'proxy',name:'Proxy',icon:'\u25C8',desc:'Middleware & providers'},
  observe:{id:'observe',name:'Observe',icon:'\u25CE',desc:'Traces & costs'},
  trust:{id:'trust',name:'Trust',icon:'\u2B21',desc:'Policies & audit'},
  studio:{id:'studio',name:'Studio',icon:'\u25C7',desc:'Prompts & experiments'},
  forge:{id:'forge',name:'Forge',icon:'\u2B22',desc:'Workflows & tools'},
  exchange:{id:'exchange',name:'Exchange',icon:'\u21C4',desc:'Pack marketplace'},
};
const APP_ORDER=['overview','proxy','observe','trust','studio','forge','exchange'];
let _adminKey=sessionStorage.getItem('sy_admin_key')||'';
function setAdminKey(k){_adminKey=k;sessionStorage.setItem('sy_admin_key',k)}
async function api(path,opts={}){
  const headers=opts.headers||{};
  if(_adminKey)headers['X-Admin-Key']=_adminKey;
  if(opts.body&&typeof opts.body==='string')headers['Content-Type']='application/json';
  try{const r=await fetch(path,{...opts,headers});if(r.status===401||r.status===403)return{_error:r.status};if(!r.ok){const t=await r.text().catch(()=>'');try{return{_error:r.status,...JSON.parse(t)}}catch(e){return{_error:r.status,message:t}}}return await r.json()}catch(e){return{_error:e.message}}
}
const fmt={
  usd:v=>v==null?'\u2014':v<0.01&&v>0?'$'+v.toFixed(4):'$'+v.toFixed(2),
  num:v=>v==null?'\u2014':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(v),
  ms:v=>v==null?'\u2014':v>=1000?(v/1000).toFixed(1)+'s':Math.round(v)+'ms',
  ago:ts=>{if(!ts)return'\u2014';const s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'},
  trunc:(s,n=60)=>s&&s.length>n?s.substring(0,n)+'\u2026':s||'\u2014',
  hash:s=>s?s.substring(0,12)+'\u2026':'\u2014',
};

// ─── Shared Components ─────────────────────────────────────────────
function Stat({label,value,sub,accent}){return html`<div class="stat"><div class="stat-label">${label}</div><div class="stat-value ${accent?'accent':''}">${value}</div>${sub&&html`<div class="stat-sub">${sub}</div>`}</div>`}
function Badge({text,variant}){return html`<span class="badge ${variant||''}">${text}</span>`}
function TabBar({tabs,active,onChange}){return html`<div class="tab-bar">${tabs.map(t=>html`<button key=${t} class="tab ${active===t?'active':''}" onClick=${()=>onChange(t)}>${t}</button>`)}</div>`}
function Toast({msg,type,onDone}){useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);return html`<div class="toast toast-${type||'info'}">${msg}</div>`}
function Btn({children,onClick,variant,disabled,small}){return html`<button class="btn ${variant||''} ${small?'btn-sm':''}" onClick=${onClick} disabled=${disabled}>${children}</button>`}
function Input({label,value,onChange,type,placeholder,mono}){return html`<div class="field">${label&&html`<label class="field-label">${label}</label>`}<input type=${type||'text'} value=${value} onInput=${e=>onChange(e.target.value)} class="field-input ${mono?'mono':''}" placeholder=${placeholder||''}/></div>`}
function Select({label,value,onChange,options}){return html`<div class="field">${label&&html`<label class="field-label">${label}</label>`}<select class="field-input" value=${value} onChange=${e=>onChange(e.target.value)}>${options.map(o=>html`<option key=${o.value||o} value=${o.value||o}>${o.label||o}</option>`)}</select></div>`}
function Modal({title,onClose,children}){return html`<div class="modal-overlay" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}><div class="modal"><div class="modal-head"><span class="modal-title">${title}</span><button class="modal-close" onClick=${onClose}>\u2715</button></div><div class="modal-body">${children}</div></div></div>`}
function DataTable({columns,rows,emptyMsg,onRowClick}){
  if(!rows||rows.length===0)return html`<div class="empty-state">${emptyMsg||'No data yet.'}</div>`;
  const gc=columns.map(c=>c.width||'1fr').join(' ');
  return html`<div class="data-table"><div class="dt-head" style="grid-template-columns:${gc}">${columns.map(c=>html`<span key=${c.key}>${c.label}</span>`)}</div><div class="dt-body">${rows.map((row,i)=>html`<div key=${row.id||i} class="dt-row ${onRowClick?'dt-clickable':''}" style="grid-template-columns:${gc}" onClick=${()=>onRowClick&&onRowClick(row)}>${columns.map(c=>html`<span key=${c.key} class="${c.mono?'mono':''} ${c.accent?'dt-accent':''}">${c.render?c.render(row):row[c.key]||'\u2014'}</span>`)}</div>`)}</div></div>`;
}

// ─── Overview ──────────────────────────────────────────────────────
function OverviewView(){
  const[apps,setApps]=useState(null);const[users,setUsers]=useState([]);const[mods,setMods]=useState(0);
  useEffect(()=>{(async()=>{const a=await api('/api/apps');setApps(a.apps||[]);const u=await api('/api/auth/users');setUsers(u.users||[]);const m=await api('/api/proxy/modules');setMods(m.count||0)})()},[]);
  if(!apps)return html`<div class="loading">Loading\u2026</div>`;
  return html`<div class="page-head"><div class="page-eyebrow">Console</div><h2>System Overview</h2><p class="page-sub">All 6 apps running on a single binary.</p></div>
    <div class="stats-row"><${Stat} label="Apps" value=${apps.length} accent/><${Stat} label="Users" value=${users.length}/><${Stat} label="Modules" value=${mods}/><${Stat} label="Status" value="Operational" accent/></div>
    <div class="app-grid">${apps.map(a=>{const cfg=APPS[a.name];return html`<div key=${a.name} class="app-card"><div class="app-card-head"><span class="app-card-icon">${cfg?.icon||'\u25C6'}</span><span class="app-card-name">${a.name}</span><${Badge} text="live" variant="success"/></div><div class="app-card-desc">${a.description}</div><code class="app-card-api">${a.api}</code></div>`})}</div>`;
}

// ─── Proxy (Interactive toggles) ───────────────────────────────────
function ProxyView(){
  const[tab,setTab]=useState('modules');const[data,setData]=useState({});const[toast,setToast]=useState(null);const[filter,setFilter]=useState('');
  const load=async()=>{const[m,p,r]=await Promise.all([api('/api/proxy/modules'),api('/api/proxy/providers'),api('/api/proxy/routes')]);setData({modules:m.modules||[],providers:p.providers||[],routes:r.routes||[]})};
  useEffect(()=>{load()},[]);
  const toggleModule=async(name,enabled)=>{const r=await api('/api/proxy/modules/'+name,{method:'PUT',body:JSON.stringify({enabled:!enabled})});if(r._error){setToast({msg:'Failed: '+name,type:'error'});return}setToast({msg:name+' '+(enabled?'disabled':'enabled'),type:'success'});load()};
  const bulkToggle=async(cat,enabled)=>{const body=cat==='all'?{modules:d('modules').map(m=>m.name),enabled}:{category:cat,enabled};const r=await api('/api/proxy/modules/bulk',{method:'POST',body:JSON.stringify(body)});if(r._error){setToast({msg:'Bulk toggle failed',type:'error'});return}setToast({msg:(r.affected||0)+' modules '+(enabled?'enabled':'disabled'),type:'success'});load()};
  const d=k=>Array.isArray(data[k])?data[k]:[];
  const filtered=d('modules').filter(m=>!filter||m.name.toLowerCase().includes(filter.toLowerCase())||(m.category||'').toLowerCase().includes(filter.toLowerCase()));
  return html`<div class="page-head"><div class="page-eyebrow">Proxy</div><h2>Middleware Chain</h2><p class="page-sub">Toggle modules, manage providers & routes.</p></div>
    <div class="stats-row"><${Stat} label="Modules" value=${d('modules').length} sub=${d('modules').filter(m=>m.enabled).length+' enabled'} accent/><${Stat} label="In Chain" value=${d('modules').filter(m=>m.in_chain).length} sub="live middleware"/><${Stat} label="Providers" value=${d('providers').length}/><${Stat} label="Routes" value=${d('routes').length}/></div>
    <${TabBar} tabs=${['modules','chain','providers','routes']} active=${tab} onChange=${setTab}/>
    ${tab==='modules'?html`<div style="margin-bottom:12px;display:flex;gap:12px;align-items:center"><input class="field-input" placeholder="Filter modules..." value=${filter} onInput=${e=>setFilter(e.target.value)} style="max-width:300px"/>
      <${Btn} small onClick=${()=>bulkToggle('all',false)} disabled=${!d('modules').some(m=>m.enabled)}>Disable All<//><${Btn} small onClick=${()=>bulkToggle('all',true)}>Enable All<//></div>
      <div class="data-table"><div class="dt-head" style="grid-template-columns:1.5fr 100px 80px 80px 80px"><span>Module</span><span>Category</span><span>Chain</span><span>Status</span><span>Toggle</span></div>
      <div class="dt-body">${filtered.map(m=>html`<div key=${m.name} class="dt-row" style="grid-template-columns:1.5fr 100px 80px 80px 80px">
        <span class="mono">${m.name}</span><span class="mono" style="font-size:0.72rem;color:var(--cream-muted)">${m.category||'general'}</span>
        <span>${m.in_chain?html`<${Badge} text="live" variant="success"/>`:html`<${Badge} text="db" variant="muted"/>`}</span>
        <span><${Badge} text=${m.enabled?'on':'off'} variant=${m.enabled?'success':'muted'}/></span>
        <span><button class="toggle-btn ${m.enabled?'on':''}" onClick=${()=>toggleModule(m.name,m.enabled)}><span class="toggle-knob"></span></button></span>
      </div>`)}</div></div>`:
    tab==='chain'?html`<div class="data-table"><div class="dt-head" style="grid-template-columns:1.5fr 100px 100px 80px"><span>Middleware</span><span>Category</span><span>Status</span><span>Toggle</span></div>
      <div class="dt-body">${d('modules').filter(m=>m.in_chain).map(m=>html`<div key=${m.name} class="dt-row" style="grid-template-columns:1.5fr 100px 100px 80px">
        <span class="mono">${m.name}</span><span class="mono" style="font-size:0.72rem;color:var(--cream-muted)">${m.category||'general'}</span>
        <span><${Badge} text=${m.enabled?'on':'off'} variant=${m.enabled?'success':'muted'}/></span>
        <span><button class="toggle-btn ${m.enabled?'on':''}" onClick=${()=>toggleModule(m.name,m.enabled)}><span class="toggle-knob"></span></button></span>
      </div>`)}</div></div>`:
    tab==='providers'?html`<${DataTable} columns=${[{key:'name',label:'Provider',width:'1fr',mono:true},{key:'status',label:'Status',width:'120px',render:r=>html`<${Badge} text=${r.status||'configured'} variant="success"/>`}]} rows=${d('providers')} emptyMsg="No providers configured."/>`:
    html`<${DataTable} columns=${[{key:'method',label:'Method',width:'100px',render:r=>html`<${Badge} text=${r.method||'ANY'} variant="muted"/>`},{key:'path',label:'Path',width:'1.5fr',mono:true},{key:'handler',label:'Handler',width:'1fr',mono:true}]} rows=${d('routes')} emptyMsg="No routes."/>`}
    ${toast&&html`<${Toast} msg=${toast.msg} type=${toast.type} onDone=${()=>setToast(null)}/>`}`;
}

// ─── Chart Components ──────────────────────────────────────────────
function Sparkline({data,width=200,height=40,color='var(--rust-light)',fill=true}){
  if(!data||data.length<2)return html`<svg width=${width} height=${height}><text x=${width/2} y=${height/2+4} text-anchor="middle" fill="var(--cream-muted)" font-size="10" font-family="var(--font-mono)">No data</text></svg>`;
  const max=Math.max(...data,0.001);const min=Math.min(...data,0);const range=max-min||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*width,(1-(v-min)/range)*(height-4)+2]);
  const line=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area=line+' L'+width+','+height+' L0,'+height+' Z';
  return html`<svg width=${width} height=${height} style="display:block">${fill&&html`<path d=${area} fill=${color} opacity="0.1"/>`}<path d=${line} fill="none" stroke=${color} stroke-width="1.5"/><circle cx=${pts[pts.length-1][0]} cy=${pts[pts.length-1][1]} r="2.5" fill=${color}/></svg>`;
}
function MiniBar({items,width=260,height=120}){
  if(!items||items.length===0)return html`<div class="empty-state" style="padding:16px;font-size:0.78rem">No data.</div>`;
  const max=Math.max(...items.map(i=>i.value),0.001);const barH=Math.min(18,Math.floor((height-8)/items.length)-4);
  return html`<svg width=${width} height=${items.length*(barH+6)+4} style="display:block">${items.map((item,i)=>{
    const w=Math.max(2,(item.value/max)*(width-90));const y=i*(barH+6)+2;
    return html`<g key=${i}><rect x="80" y=${y} width=${w} height=${barH} fill=${item.color||'var(--rust)'} rx="2" opacity="0.8"/><text x="76" y=${y+barH/2+4} text-anchor="end" fill="var(--cream-dim)" font-size="10" font-family="var(--font-mono)">${item.label}</text><text x=${82+w} y=${y+barH/2+4} fill="var(--cream-muted)" font-size="9" font-family="var(--font-mono)">${item.display||item.value.toFixed(2)}</text></g>`;
  })}</svg>`;
}

// ─── Observe (with charts + trace detail) ──────────────────────────
function ObserveView(){
  const[tab,setTab]=useState('dashboard');const[data,setData]=useState({});const[detail,setDetail]=useState(null);const[ts,setTs]=useState({});const[period,setPeriod]=useState('24h');
  useEffect(()=>{(async()=>{const[ov,t,c,al,an]=await Promise.all([api('/api/observe/overview'),api('/api/observe/traces'),api('/api/observe/costs'),api('/api/observe/alerts'),api('/api/observe/anomalies')]);setData({overview:ov||{},traces:t.traces||[],costs:c.costs||c.providers||[],alerts:al.rules||al.alerts||[],anomalies:an.anomalies||[]})})()},[]);
  useEffect(()=>{(async()=>{const r=await api('/api/observe/timeseries?period='+period);setTs(r||{})})()},[period]);
  const d=k=>Array.isArray(data[k])?data[k]:[];
  const ov=data.overview||{};const today=ov.today||{};
  const buckets=ts.buckets||[];const provs=ts.providers||[];const models=ts.models||[];
  const PCOLORS=['var(--rust-light)','var(--gold)','var(--green)','var(--leather-light)','var(--cream-muted)'];
  return html`<div class="page-head"><div class="page-eyebrow">Observe</div><h2>Analytics & Traces</h2><p class="page-sub">Cost attribution, alerts & anomaly detection.</p></div>
    <div class="stats-row"><${Stat} label="Today\u2019s Requests" value=${fmt.num(today.requests||0)} accent/><${Stat} label="Today\u2019s Cost" value=${fmt.usd(today.cost_usd||0)}/><${Stat} label="Total Traces" value=${fmt.num(ov.total_traces||0)}/><${Stat} label="Alerts" value=${d('alerts').length} sub=${d('alerts').filter(a=>a.last_fired).length+' fired'}/></div>
    <${TabBar} tabs=${['dashboard','traces','costs','alerts','anomalies']} active=${tab} onChange=${setTab}/>
    ${tab==='dashboard'?html`<div class="chart-period"><span class="chart-period-label">Period:</span>${['24h','7d','30d'].map(p=>html`<button key=${p} class="btn btn-sm ${period===p?'primary':''}" onClick=${()=>setPeriod(p)}>${p}</button>`)}</div>
      <div class="chart-grid">
        <div class="chart-card"><div class="chart-title">Requests</div><${Sparkline} data=${buckets.map(b=>b.requests)} width=${280} height=${50}/></div>
        <div class="chart-card"><div class="chart-title">Cost (USD)</div><${Sparkline} data=${buckets.map(b=>b.cost_usd)} width=${280} height=${50} color="var(--gold)"/></div>
        <div class="chart-card"><div class="chart-title">Avg Latency (ms)</div><${Sparkline} data=${buckets.map(b=>b.avg_latency_ms)} width=${280} height=${50} color="var(--leather-light)"/></div>
        <div class="chart-card"><div class="chart-title">Errors</div><${Sparkline} data=${buckets.map(b=>b.errors)} width=${280} height=${50} color="var(--red)"/></div>
      </div>
      <div class="chart-grid" style="grid-template-columns:1fr 1fr">
        <div class="chart-card"><div class="chart-title">Cost by Provider (7d)</div><${MiniBar} items=${provs.map((p,i)=>({label:p.provider||'unknown',value:p.cost_usd,color:PCOLORS[i%PCOLORS.length],display:fmt.usd(p.cost_usd)}))} width=${340} height=${140}/></div>
        <div class="chart-card"><div class="chart-title">Cost by Model (7d)</div><${MiniBar} items=${models.map((m,i)=>({label:(m.model||'unknown').split('/').pop().substring(0,16),value:m.cost_usd,color:PCOLORS[i%PCOLORS.length],display:fmt.usd(m.cost_usd)}))} width=${340} height=${140}/></div>
      </div>`:
    tab==='traces'?html`<${DataTable} columns=${[
      {key:'ts',label:'Time',width:'100px',render:r=>fmt.ago(r.timestamp||r.created_at)},{key:'model',label:'Model',width:'1fr',mono:true},{key:'provider',label:'Provider',width:'110px',mono:true},
      {key:'ti',label:'In',width:'70px',mono:true,render:r=>fmt.num(r.tokens_in)},{key:'to',label:'Out',width:'70px',mono:true,render:r=>fmt.num(r.tokens_out)},
      {key:'lat',label:'Latency',width:'90px',mono:true,render:r=>fmt.ms(r.latency_ms)},{key:'cost',label:'Cost',width:'90px',mono:true,accent:true,render:r=>fmt.usd(r.cost_usd)},
      {key:'s',label:'',width:'50px',render:r=>html`<${Badge} text=${r.status_code===200||!r.status_code?'ok':'err'} variant=${r.status_code===200||!r.status_code?'success':'danger'}/>`}
    ]} rows=${d('traces')} onRowClick=${r=>setDetail(r)} emptyMsg="No traces yet \u2014 send requests to /v1/chat/completions."/>`:
    tab==='costs'?html`<${DataTable} columns=${[{key:'provider',label:'Provider',width:'1fr',mono:true},{key:'model',label:'Model',width:'1fr',mono:true},{key:'reqs',label:'Requests',width:'110px',mono:true,render:r=>fmt.num(r.requests||r.count)},{key:'cost',label:'Cost',width:'110px',mono:true,accent:true,render:r=>fmt.usd(r.cost||r.total_cost)}]} rows=${d('costs')} emptyMsg="No cost data yet."/>`:
    tab==='alerts'?html`<${DataTable} columns=${[{key:'name',label:'Alert',width:'1.5fr'},{key:'metric',label:'Metric',width:'1fr',mono:true},{key:'threshold',label:'Threshold',width:'110px',mono:true},{key:'status',label:'Status',width:'100px',render:r=>html`<${Badge} text=${r.last_fired?'fired':'active'} variant=${r.last_fired?'danger':'success'}/>`}]} rows=${d('alerts')} emptyMsg="No alerts configured."/>`:
    html`<${DataTable} columns=${[{key:'ts',label:'Detected',width:'110px',render:r=>fmt.ago(r.detected_at||r.created_at)},{key:'metric',label:'Metric',width:'1fr',mono:true},{key:'val',label:'Value',width:'90px',mono:true},{key:'sev',label:'Severity',width:'100px',render:r=>html`<${Badge} text=${r.severity||'medium'} variant=${r.severity==='high'?'danger':'warn'}/>`}]} rows=${d('anomalies')} emptyMsg="No anomalies detected."/>`}
    ${detail&&html`<${Modal} title="Trace Detail" onClose=${()=>setDetail(null)}><div class="trace-detail">
      <div class="td-row"><span class="td-label">Model</span><span class="mono">${detail.model||'\u2014'}</span></div>
      <div class="td-row"><span class="td-label">Provider</span><span class="mono">${detail.provider||'\u2014'}</span></div>
      <div class="td-row"><span class="td-label">Tokens</span><span class="mono">${(detail.tokens_in||0)+' in / '+(detail.tokens_out||0)+' out'}</span></div>
      <div class="td-row"><span class="td-label">Latency</span><span class="mono">${fmt.ms(detail.latency_ms)}</span></div>
      <div class="td-row"><span class="td-label">Cost</span><span class="mono" style="color:var(--gold)">${fmt.usd(detail.cost_usd)}</span></div>
      <div class="td-row"><span class="td-label">Status</span><span class="mono">${detail.status_code||200}</span></div>
      <div class="td-row"><span class="td-label">Time</span><span class="mono">${detail.timestamp||detail.created_at||'\u2014'}</span></div>
      ${detail.user_id?html`<div class="td-row"><span class="td-label">User ID</span><span class="mono">#${detail.user_id}</span></div>`:''}
      ${detail.request_body?html`<div class="td-section"><div class="td-label">Request</div><pre class="td-pre">${typeof detail.request_body==='string'?detail.request_body:JSON.stringify(detail.request_body,null,2)}</pre></div>`:''}
      ${detail.response_body?html`<div class="td-section"><div class="td-label">Response</div><pre class="td-pre">${typeof detail.response_body==='string'?detail.response_body:JSON.stringify(detail.response_body,null,2)}</pre></div>`:''}
    </div><//>}`
}

// ─── Trust ─────────────────────────────────────────────────────────
function TrustView(){
  const[tab,setTab]=useState('policies');const[data,setData]=useState({});
  useEffect(()=>{(async()=>{const[l,p,e]=await Promise.all([api('/api/trust/ledger'),api('/api/trust/policies'),api('/api/trust/evidence')]);setData({ledger:l.entries||l.events||[],policies:p.policies||[],evidence:e.packs||[]})})()},[]);
  const d=k=>Array.isArray(data[k])?data[k]:[];
  return html`<div class="page-head"><div class="page-eyebrow">Trust</div><h2>Policies & Audit</h2><p class="page-sub">Governance, compliance & evidence.</p></div>
    <div class="stats-row"><${Stat} label="Policies" value=${d('policies').length} accent/><${Stat} label="Ledger" value=${fmt.num(d('ledger').length)}/><${Stat} label="Evidence" value=${d('evidence').length}/></div>
    <${TabBar} tabs=${['policies','ledger','evidence']} active=${tab} onChange=${setTab}/>
    ${tab==='policies'?html`<${DataTable} columns=${[{key:'name',label:'Policy',width:'1.5fr'},{key:'type',label:'Type',width:'1fr',mono:true},{key:'action',label:'Action',width:'1fr'},{key:'enabled',label:'Status',width:'100px',render:r=>html`<${Badge} text=${r.enabled!==false?'active':'off'} variant=${r.enabled!==false?'success':'muted'}/>`}]} rows=${d('policies')} emptyMsg="No policies."/>`:
    tab==='ledger'?html`<${DataTable} columns=${[{key:'ts',label:'Time',width:'100px',render:r=>fmt.ago(r.timestamp||r.created_at)},{key:'action',label:'Action',width:'1fr'},{key:'actor',label:'Actor',width:'1fr',mono:true},{key:'hash',label:'Hash',width:'150px',mono:true,render:r=>fmt.hash(r.hash||r.event_hash)}]} rows=${d('ledger')} emptyMsg="No audit events."/>`:

// ─── Forge ─────────────────────────────────────────────────────────
function ForgeView(){
  const[tab,setTab]=useState('workflows');const[data,setData]=useState({});const[toast,setToast]=useState(null);
  const[selWf,setSelWf]=useState(null);const[selRun,setSelRun]=useState(null);const[runInput,setRunInput]=useState('');const[running,setRunning]=useState(null);
  const load=async()=>{const[w,r,t]=await Promise.all([api('/api/forge/workflows'),api('/api/forge/runs'),api('/api/forge/tools')]);setData({workflows:w.workflows||[],runs:r.runs||[],tools:t.tools||[]})};
  useEffect(()=>{load()},[]);
  const viewWorkflow=async slug=>{const r=await api('/api/forge/workflows/'+slug);if(!r._error)setSelWf(r)};
  const runWorkflow=async slug=>{setRunning(slug);const inp=runInput||'Hello, test this workflow';const r=await api('/api/forge/workflows/'+slug+'/run',{method:'POST',body:JSON.stringify({input:inp})});setRunning(null);if(r._error){setToast({msg:'Failed: '+(r.error||r._error),type:'error'});return}setToast({msg:'Run started: '+r.run_id,type:'success'});setRunInput('');setSelWf(null);setTimeout(load,2000);setTimeout(load,5000)};
  const viewRun=async id=>{const[r,s]=await Promise.all([api('/api/forge/runs/'+id),api('/api/forge/runs/'+id+'/steps')]);if(!r._error){r._stepLogs=s.steps||[];setSelRun(r)}};
  const refreshRun=async()=>{if(!selRun)return;const[r,s]=await Promise.all([api('/api/forge/runs/'+selRun.id),api('/api/forge/runs/'+selRun.id+'/steps')]);if(!r._error){r._stepLogs=s.steps||[];setSelRun(r)}};
  useEffect(()=>{if(selRun&&(selRun.status==='running'||selRun.status==='pending')){const t=setInterval(()=>{refreshRun();load()},2000);return()=>clearInterval(t)}},[selRun?.id,selRun?.status]);
  const d=k=>Array.isArray(data[k])?data[k]:[];
  const STEP_COLORS={'llm':'var(--rust-light)','transform':'var(--gold)','tool':'var(--green)','http':'var(--leather-light)','gate':'var(--amber)'};
  return html`<div class="page-head"><div class="page-eyebrow">Forge</div><h2>Workflow Engine</h2><p class="page-sub">DAG workflows, tools & runs. 5 step types: LLM, transform, tool, HTTP, gate.</p></div>
    <div class="stats-row"><${Stat} label="Workflows" value=${d('workflows').length} accent/><${Stat} label="Runs" value=${d('runs').length} sub=${d('runs').filter(r=>r.status==='success').length+' succeeded'}/><${Stat} label="Tools" value=${d('tools').length}/></div>
    <${TabBar} tabs=${['workflows','runs','tools']} active=${tab} onChange=${setTab}/>
    ${tab==='workflows'?html`<div class="wf-grid">${d('workflows').map(w=>html`<div key=${w.slug} class="wf-card" onClick=${()=>viewWorkflow(w.slug)}>
      <div class="wf-card-head"><span class="wf-card-name">${w.name}</span><${Badge} text=${w.enabled!==false?'active':'off'} variant=${w.enabled!==false?'success':'muted'}/></div>
      <div class="wf-card-desc">${w.description||'\u2014'}</div>
      <div class="wf-card-meta"><span class="mono">${w.slug}</span><span class="mono">${w.step_count||0} steps</span><span class="mono">${w.trigger_type||'manual'}</span></div>
    </div>`)}</div>${d('workflows').length===0&&html`<div class="empty-state">No workflows. Install the Eval Suite pack or create one via API.</div>`}`:
    tab==='runs'?html`<${DataTable} columns=${[
      {key:'id',label:'Run',width:'140px',mono:true,render:r=>fmt.trunc(r.id,18)},
      {key:'wf',label:'Workflow',width:'120px',mono:true,render:r=>r.workflow_slug||'#'+r.workflow_id},
      {key:'status',label:'Status',width:'100px',render:r=>html`<${Badge} text=${r.status||'pending'} variant=${r.status==='success'?'success':r.status==='running'?'warn':r.status==='failed'?'danger':'muted'}/>`},
      {key:'progress',label:'Progress',width:'80px',mono:true,render:r=>(r.steps_completed||0)+'/'+(r.steps_total||0)},
      {key:'ts',label:'Started',width:'100px',render:r=>fmt.ago(r.started_at||r.created_at)},
      {key:'done',label:'Duration',width:'100px',mono:true,render:r=>{if(!r.completed_at||!r.started_at)return r.status==='running'?'running\u2026':'\u2014';const ms=new Date(r.completed_at)-new Date(r.started_at);return fmt.ms(ms)}}
    ]} rows=${d('runs')} onRowClick=${r=>viewRun(r.id)} emptyMsg="No runs yet \u2014 run a workflow to see results here."/>`:
    html`<${DataTable} columns=${[
      {key:'name',label:'Tool',width:'1.2fr',mono:true},
      {key:'type',label:'Type',width:'100px',render:r=>html`<${Badge} text=${r.type||'function'} variant=${r.type==='builtin'?'success':'muted'}/>`},
      {key:'desc',label:'Description',width:'2fr',render:r=>r.description||'\u2014'},
      {key:'enabled',label:'Status',width:'80px',render:r=>html`<${Badge} text=${r.enabled?'on':'off'} variant=${r.enabled?'success':'muted'}/>`}
    ]} rows=${d('tools')} emptyMsg="No tools. Tools will be seeded on next deploy."/>`}
    ${selWf&&html`<${Modal} title=${selWf.name||selWf.slug} onClose=${()=>setSelWf(null)}>
      <div class="wf-detail">
        <div style="font-size:0.85rem;color:var(--cream-dim);font-style:italic;margin-bottom:16px">${selWf.description||''}</div>
        <div class="section-title">Steps (${(selWf.steps||[]).length})</div>
        <div class="wf-steps">${(selWf.steps||[]).map((s,i)=>html`<div key=${s.id||i} class="wf-step">
          <div class="wf-step-head">
            <span class="wf-step-badge" style="background:${STEP_COLORS[s.type]||'var(--cream-muted)'}20;color:${STEP_COLORS[s.type]||'var(--cream-muted)'}">${s.type||'llm'}</span>
            <span class="wf-step-id">${s.id}</span>
            ${s.depends_on&&s.depends_on.length>0?html`<span class="wf-step-deps">\u2190 ${s.depends_on.join(', ')}</span>`:''}
          </div>
          ${s.config?.model?html`<div class="wf-step-field"><span class="wf-step-label">model</span><span class="mono">${s.config.model}</span></div>`:''}
          ${s.config?.expression?html`<div class="wf-step-field"><span class="wf-step-label">expr</span><span class="mono">${s.config.expression}</span></div>`:''}
          ${s.config?.tool_name?html`<div class="wf-step-field"><span class="wf-step-label">tool</span><span class="mono">${s.config.tool_name}</span></div>`:''}
          ${s.config?.condition?html`<div class="wf-step-field"><span class="wf-step-label">gate</span><span class="mono">${s.config.condition} ${s.config.threshold||''}</span></div>`:''}
          ${s.config?.prompt?html`<div class="wf-step-prompt">${fmt.trunc(s.config.prompt,120)}</div>`:''}
        </div>`)}</div>
        <div class="section-title" style="margin-top:20px">Run Workflow</div>
        <textarea class="field-input mono" rows="3" placeholder='Enter input (e.g. "What is quantum computing?")' value=${runInput} onInput=${e=>setRunInput(e.target.value)} style="resize:vertical;margin-bottom:12px;font-size:0.78rem"/>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <${Btn} onClick=${()=>setSelWf(null)}>Close<//>
          <${Btn} variant="primary" onClick=${()=>runWorkflow(selWf.slug)} disabled=${running===selWf.slug}>${running===selWf.slug?'Starting\u2026':'Run Workflow'}<//>
        </div>
      </div>
    <//>`}
    ${selRun&&html`<${Modal} title=${'Run: '+fmt.trunc(selRun.id,20)} onClose=${()=>setSelRun(null)}>
      <div class="wf-detail">
        <div class="td-row"><span class="td-label">Status</span><span><${Badge} text=${selRun.status} variant=${selRun.status==='success'?'success':selRun.status==='failed'?'danger':'warn'}/>${(selRun.status==='running'||selRun.status==='pending')?html` <${Btn} small onClick=${refreshRun}>\u21BB Refresh<//>`:''}</span></div>
        <div class="td-row"><span class="td-label">Workflow</span><span class="mono">${selRun.workflow_slug||'#'+selRun.workflow_id}</span></div>
        <div class="td-row"><span class="td-label">Progress</span><span class="mono">${selRun.steps_completed||0} / ${selRun.steps_total||0}</span></div>
        ${selRun.error?html`<div class="td-row"><span class="td-label">Error</span><span style="color:var(--red);font-size:0.82rem">${selRun.error}</span></div>`:''}
        ${selRun.input?html`<div class="td-section"><div class="td-label">Input</div><pre class="td-pre">${typeof selRun.input==='string'?selRun.input:JSON.stringify(selRun.input,null,2)}</pre></div>`:''}
        ${(selRun._stepLogs&&selRun._stepLogs.length>0)?html`<div class="td-section"><div class="td-label">Step Execution Log</div>
          ${selRun._stepLogs.map((s,i)=>html`<div key=${s.step_id||i} class="run-step-result">
            <div class="run-step-head">
              <span class="wf-step-badge" style="background:${STEP_COLORS[s.step_type]||'var(--cream-muted)'}20;color:${STEP_COLORS[s.step_type]||'var(--cream-muted)'}">${s.step_type||'llm'}</span>
              <span class="mono">${s.step_id}</span>
              <${Badge} text=${s.status||'?'} variant=${s.status==='success'?'success':s.status==='running'?'warn':s.status==='skipped'?'muted':'danger'}/>
              ${s.latency_ms?html`<span class="mono" style="font-size:0.7rem;color:var(--cream-muted)">${fmt.ms(s.latency_ms)}</span>`:''}
            </div>
            ${s.tokens_in||s.tokens_out?html`<div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--cream-muted);margin:4px 0">${s.tokens_in||0} in / ${s.tokens_out||0} out</div>`:''}
            ${s.output?html`<pre class="td-pre" style="max-height:120px">${fmt.trunc(s.output,500)}</pre>`:''}
            ${s.error?html`<div style="color:var(--red);font-size:0.78rem;margin-top:4px">${s.error}</div>`:''}
          </div>`)}
        </div>`:selRun.output?html`<div class="td-section"><div class="td-label">Step Results</div>
          ${typeof selRun.output==='object'&&selRun.output!==null?Object.entries(selRun.output).map(([k,v])=>html`<div key=${k} class="run-step-result">
            <div class="run-step-head"><span class="mono">${k}</span><${Badge} text=${v.status||'?'} variant=${v.status==='success'?'success':'danger'}/>${v.latency_ms?html`<span class="mono" style="font-size:0.7rem;color:var(--cream-muted)">${fmt.ms(v.latency_ms)}</span>`:''}</div>
            ${v.tokens_in||v.tokens_out?html`<div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--cream-muted);margin:4px 0">${v.tokens_in||0} in / ${v.tokens_out||0} out</div>`:''}
            ${v.output?html`<pre class="td-pre" style="max-height:120px">${fmt.trunc(v.output,500)}</pre>`:''}
            ${v.error?html`<div style="color:var(--red);font-size:0.78rem;margin-top:4px">${v.error}</div>`:''}
          </div>`):html`<pre class="td-pre">${JSON.stringify(selRun.output,null,2)}</pre>`}
        </div>`:''}
      </div>
    <//>`}
    ${toast&&html`<${Toast} msg=${toast.msg} type=${toast.type} onDone=${()=>setToast(null)}/>`}`;
}

// ─── Exchange (with install/uninstall) ─────────────────────────────
function ExchangeView(){
  const[tab,setTab]=useState('packs');const[data,setData]=useState({});const[toast,setToast]=useState(null);const[installing,setInstalling]=useState(null);
  const load=async()=>{const[p,i]=await Promise.all([api('/api/exchange/packs'),api('/api/exchange/installed')]);setData({packs:p.packs||[],installed:i.installed||[]})};
  useEffect(()=>{load()},[]);
  const installPack=async(slug)=>{setInstalling(slug);const r=await api('/api/exchange/packs/'+slug+'/install',{method:'POST'});setInstalling(null);if(r._error){setToast({msg:'Failed: '+(r.error||r._error),type:'error'});return}setToast({msg:slug+' installed! ('+r.applied+' resources)',type:'success'});load()};
  const uninstall=async(id)=>{await api('/api/exchange/installed/'+id,{method:'DELETE'});setToast({msg:'Uninstalled',type:'success'});load()};
  const d=k=>Array.isArray(data[k])?data[k]:[];
  const installedSlugs=new Set(d('installed').map(i=>i.pack_slug));
  return html`<div class="page-head"><div class="page-eyebrow">Exchange</div><h2>Pack Marketplace</h2><p class="page-sub">Install config packs in one click.</p></div>
    <div class="stats-row"><${Stat} label="Available" value=${d('packs').length} accent/><${Stat} label="Installed" value=${d('installed').length}/></div>
    <${TabBar} tabs=${['packs','installed']} active=${tab} onChange=${setTab}/>
    ${tab==='packs'?html`<div class="pack-grid">${d('packs').map(p=>html`<div key=${p.slug} class="pack-card">
      <div class="pack-name">${p.name||p.slug}</div><div class="pack-desc">${p.description||'\u2014'}</div>
      <div class="pack-meta"><span class="mono">${p.version||'1.0.0'}</span></div>
      <div class="pack-actions">${installedSlugs.has(p.slug)?html`<${Badge} text="installed" variant="success"/>`:html`<${Btn} small variant="primary" onClick=${()=>installPack(p.slug)} disabled=${installing===p.slug}>${installing===p.slug?'Installing\u2026':'Install'}<//>`}</div>
    </div>`)}</div>`:
    html`<${DataTable} columns=${[{key:'pack_slug',label:'Pack',width:'1fr',mono:true},{key:'version',label:'Version',width:'90px',mono:true},{key:'ts',label:'Installed',width:'110px',render:r=>fmt.ago(r.installed_at||r.created_at)},{key:'a',label:'',width:'100px',render:r=>html`<${Btn} small variant="danger" onClick=${()=>uninstall(r.id)}>Uninstall<//>`}]} rows=${d('installed')} emptyMsg="No packs installed."/>`}
    ${toast&&html`<${Toast} msg=${toast.msg} type=${toast.type} onDone=${()=>setToast(null)}/>`}`;
}

// ─── Settings (Users, API Keys, Provider Keys) ─────────────────────
function SettingsView(){
  const[users,setUsers]=useState([]);const[sel,setSel]=useState(null);const[keys,setKeys]=useState([]);const[provs,setProvs]=useState([]);
  const[toast,setToast]=useState(null);const[showNew,setShowNew]=useState(false);const[newEmail,setNewEmail]=useState('');const[newName,setNewName]=useState('');
  const[newKey,setNewKey]=useState(null);const[showProv,setShowProv]=useState(false);const[pn,setPn]=useState('openai');const[pk,setPk]=useState('');const[pu,setPu]=useState('');
  const loadUsers=async()=>{const r=await api('/api/auth/users');setUsers(r.users||[])};
  useEffect(()=>{loadUsers()},[]);
  const selectUser=async u=>{setSel(u);const[k,p]=await Promise.all([api('/api/auth/users/'+u.id+'/keys'),api('/api/auth/users/'+u.id+'/providers')]);setKeys(k.keys||[]);setProvs(p.providers||[])};
  const createUser=async()=>{const r=await api('/api/auth/users',{method:'POST',body:JSON.stringify({email:newEmail,name:newName})});if(r._error){setToast({msg:'Error: '+(r.error||r._error),type:'error'});return}setNewKey(r.api_key);setShowNew(false);setNewEmail('');setNewName('');setToast({msg:'User created!',type:'success'});loadUsers()};
  const genKey=async()=>{if(!sel)return;const r=await api('/api/auth/users/'+sel.id+'/keys',{method:'POST',body:JSON.stringify({name:'key-'+(keys.length+1)})});if(r._error){setToast({msg:'Error',type:'error'});return}setNewKey(r);setToast({msg:'Key created!',type:'success'});selectUser(sel)};
  const revoke=async kid=>{if(!sel)return;await api('/api/auth/users/'+sel.id+'/keys/'+kid,{method:'DELETE'});setToast({msg:'Revoked',type:'success'});selectUser(sel)};
  const addProv=async()=>{if(!sel||!pk)return;await api('/api/auth/users/'+sel.id+'/providers/'+pn,{method:'PUT',body:JSON.stringify({api_key:pk,base_url:pu})});setToast({msg:pn+' saved',type:'success'});setShowProv(false);setPk('');setPu('');selectUser(sel)};
  const delProv=async p=>{if(!sel)return;await api('/api/auth/users/'+sel.id+'/providers/'+p,{method:'DELETE'});setToast({msg:'Deleted',type:'success'});selectUser(sel)};
  return html`<div class="page-head"><div class="page-eyebrow">Settings</div><h2>Users & Configuration</h2><p class="page-sub">Manage users, API keys & provider credentials.</p></div>
    <div class="stats-row"><${Stat} label="Users" value=${users.length} accent/><${Stat} label="Selected" value=${sel?sel.email:'None'}/></div>
    <div class="settings-layout">
      <div class="settings-sidebar"><div class="settings-sidebar-head"><span>Users</span><${Btn} small variant="primary" onClick=${()=>setShowNew(true)}>+ New<//></div>
        <div class="user-list">${users.map(u=>html`<div key=${u.id} class="user-item ${sel?.id===u.id?'active':''}" onClick=${()=>selectUser(u)}><div class="user-email">${u.email}</div><div class="user-meta">${u.tier} \u00B7 ${fmt.ago(u.created_at)}</div></div>`)}
        ${users.length===0&&html`<div class="empty-state" style="padding:24px;font-size:0.8rem">No users.</div>`}</div></div>
      <div class="settings-main">
        ${!sel?html`<div class="empty-state">Select a user to manage keys and providers.</div>`:html`
          <div class="section-head"><h3>${sel.name||sel.email}</h3><${Badge} text=${sel.tier} variant=${sel.tier==='free'?'muted':'success'}/></div>
          <div class="section-title">API Keys <${Btn} small onClick=${genKey}>+ Generate<//></div>
          ${newKey&&html`<div class="key-alert"><div class="key-alert-title">New API Key (copy now \u2014 shown once)</div><code class="key-alert-value">${newKey.key||newKey}</code><${Btn} small onClick=${()=>{navigator.clipboard.writeText(newKey.key||newKey);setToast({msg:'Copied!',type:'success'})}}>Copy<//></div>`}
          <${DataTable} columns=${[{key:'name',label:'Name',width:'1fr',mono:true},{key:'key_prefix',label:'Key',width:'1.5fr',mono:true},{key:'last_used',label:'Last Used',width:'100px',render:r=>fmt.ago(r.last_used)},{key:'a',label:'',width:'80px',render:r=>html`<${Btn} small variant="danger" onClick=${()=>revoke(r.id)}>Revoke<//>`}]} rows=${keys} emptyMsg="No API keys."/>
          <div class="section-title" style="margin-top:24px">Provider Keys <${Btn} small onClick=${()=>setShowProv(true)}>+ Add<//></div>
          <${DataTable} columns=${[{key:'provider',label:'Provider',width:'1fr',mono:true},{key:'base_url',label:'Base URL',width:'1.5fr',mono:true,render:r=>r.base_url||'default'},{key:'ts',label:'Added',width:'100px',render:r=>fmt.ago(r.created_at)},{key:'a',label:'',width:'80px',render:r=>html`<${Btn} small variant="danger" onClick=${()=>delProv(r.provider)}>Delete<//>`}]} rows=${provs} emptyMsg="No provider keys."/>`}
      </div></div>
    ${showNew&&html`<${Modal} title="Create User" onClose=${()=>setShowNew(false)}><${Input} label="Email" value=${newEmail} onChange=${setNewEmail} placeholder="user@example.com"/><${Input} label="Name" value=${newName} onChange=${setNewName} placeholder="Optional"/><div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end"><${Btn} onClick=${()=>setShowNew(false)}>Cancel<//><${Btn} variant="primary" onClick=${createUser} disabled=${!newEmail}>Create User<//></div><//>`}
    ${showProv&&html`<${Modal} title="Add Provider Key" onClose=${()=>setShowProv(false)}><${Select} label="Provider" value=${pn} onChange=${setPn} options=${[{value:'openai',label:'OpenAI'},{value:'anthropic',label:'Anthropic'},{value:'gemini',label:'Google Gemini'},{value:'groq',label:'Groq'},{value:'together',label:'Together'},{value:'mistral',label:'Mistral'}]}/><${Input} label="API Key" value=${pk} onChange=${setPk} type="password" placeholder="sk-..." mono/><div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end"><${Btn} onClick=${()=>setShowProv(false)}>Cancel<//><${Btn} variant="primary" onClick=${addProv} disabled=${!pk}>Save<//></div><//>`}
    ${toast&&html`<${Toast} msg=${toast.msg} type=${toast.type} onDone=${()=>setToast(null)}/>`}`;
}

const VIEWS={overview:OverviewView,proxy:ProxyView,observe:ObserveView,trust:TrustView,studio:StudioView,forge:ForgeView,exchange:ExchangeView,settings:SettingsView};


function Onboarding({onComplete}){
  const[step,setStep]=useState(0);const[email,setEmail]=useState('');const[name,setName]=useState('');const[prov,setProv]=useState('openai');const[pk,setPk]=useState('');
  const[result,setResult]=useState(null);const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const createUser=async()=>{setLoading(true);setErr('');const r=await api('/api/auth/users',{method:'POST',body:JSON.stringify({email,name})});setLoading(false);if(r._error||r.error){setErr(r.error||'Failed');return}setResult(r);setStep(1)};
  const addProvider=async()=>{if(!result?.user)return;setLoading(true);setErr('');const r=await api('/api/auth/users/'+result.user.id+'/providers/'+prov,{method:'PUT',body:JSON.stringify({api_key:pk})});setLoading(false);if(r._error||r.error){setErr(r.error||'Failed');return}setStep(2)};
  const finish=()=>{sessionStorage.setItem('sy_onboarded','1');onComplete()};
  const STEPS=[{n:'Create User',d:'Set up the first user account.'},{n:'Add Provider',d:'Connect your LLM provider API key.'},{n:'Ready',d:'Your proxy is configured.'}];
  return html`<div class="onboard-overlay"><div class="onboard-box">
    <div class="onboard-header"><div style="font-family:var(--font-mono);font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--leather);margin-bottom:8px">Welcome to Stockyard</div>
    <h2 style="font-size:1.4rem;margin-bottom:4px">Quick Setup</h2><p style="color:var(--cream-dim);font-style:italic;font-size:0.9rem">Get proxying in 2 minutes.</p></div>
    <div class="onboard-steps">${STEPS.map((s,i)=>html`<div key=${i} class="onboard-step ${i===step?'active':i<step?'done':''}"><span class="onboard-step-num">${i<step?'\u2713':i+1}</span><span>${s.n}</span></div>`)}</div>
    <div class="onboard-content">
    ${step===0?html`<${Input} label="Email" value=${email} onChange=${setEmail} placeholder="you@company.com"/>
      <${Input} label="Name (optional)" value=${name} onChange=${setName} placeholder="Your name"/>
      ${err&&html`<div style="color:var(--red);font-size:0.8rem;margin-bottom:8px">${err}</div>`}
      <${Btn} variant="primary" onClick=${createUser} disabled=${!email||loading}>${loading?'Creating...':'Create User & API Key'}<//>
      ${result&&html`<div class="key-alert" style="margin-top:12px"><div class="key-alert-title">Your API Key (copy now)</div><code class="key-alert-value">${result.api_key?.key}</code></div>`}`:
    step===1?html`<${Select} label="Provider" value=${prov} onChange=${setProv} options=${[{value:'openai',label:'OpenAI'},{value:'anthropic',label:'Anthropic'},{value:'gemini',label:'Google Gemini'},{value:'groq',label:'Groq'}]}/>
      <${Input} label="API Key" value=${pk} onChange=${setPk} type="password" placeholder="sk-..." mono/>
      ${err&&html`<div style="color:var(--red);font-size:0.8rem;margin-bottom:8px">${err}</div>`}
      <div style="display:flex;gap:8px"><${Btn} variant="primary" onClick=${addProvider} disabled=${!pk||loading}>${loading?'Saving...':'Save Provider Key'}<//><${Btn} onClick=${()=>setStep(2)}>Skip for now<//></div>`:
    html`<div style="text-align:center;padding:24px 0">
      <div style="font-size:2rem;margin-bottom:12px">\u2713</div>
      <p style="font-size:1rem;margin-bottom:8px">You\u2019re all set!</p>
      <p style="color:var(--cream-dim);font-size:0.85rem;margin-bottom:20px">Your proxy is ready at <code>/v1/chat/completions</code></p>
      <pre style="background:var(--bg);border:1px solid var(--bg3);padding:12px;font-family:var(--font-mono);font-size:0.75rem;text-align:left;color:var(--cream-dim);margin-bottom:20px">curl https://YOUR_HOST/v1/chat/completions \\\n  -H "Authorization: Bearer ${result?.api_key?.key||'sk-sy-...'}" \\\n  -H "Content-Type: application/json" \\\n  -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello"}]}'</pre>
      <${Btn} variant="primary" onClick=${finish}>Open Console<//></div>`}
    </div></div></div>`;
}

function AuthGate({onAuth}){
  const[key,setKey]=useState('');const[err,setErr]=useState('');
  const tryAuth=async()=>{setAdminKey(key);const r=await api('/api/proxy/modules');if(r._error===401||r._error===403){setErr('Invalid key');setAdminKey('');return}onAuth()};
  return html`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)"><div style="width:380px;padding:2rem;border:1px solid var(--bg3);background:var(--bg2)">
    <div style="font-family:var(--font-mono);font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--leather);margin-bottom:1.5rem;text-align:center">Stockyard Console</div>
    <div style="margin-bottom:1rem"><div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--leather-light);margin-bottom:0.4rem">Admin Key</div>
    <input type="password" value=${key} onInput=${e=>setKey(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&tryAuth()} style="width:100%;padding:0.6rem 0.8rem;background:var(--bg);border:1px solid var(--bg3);color:var(--cream);font-family:var(--font-mono);font-size:0.85rem;outline:none" placeholder="sy_admin_..."/></div>
    ${err&&html`<div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--red);margin-bottom:0.8rem">${err}</div>`}
    <button onClick=${tryAuth} style="width:100%;padding:0.7rem;background:var(--rust);color:var(--cream);border:2px solid var(--rust);font-family:var(--font-mono);font-size:0.85rem;cursor:pointer">Authenticate</button>
  </div></div>`;
}

function App(){
  const[active,setActive]=useState('overview');const[authed,setAuthed]=useState(!!sessionStorage.getItem('sy_admin_key'));const[onboarded,setOnboarded]=useState(!!sessionStorage.getItem('sy_onboarded'));const[needsOnboard,setNeedsOnboard]=useState(false);const View=VIEWS[active]||OverviewView;
  useEffect(()=>{(async()=>{const r=await api('/api/proxy/modules');if(r._error===401||r._error===403){setAuthed(false);return}setAuthed(true);if(!sessionStorage.getItem('sy_onboarded')){const u=await api('/api/auth/users');if(!u.users||u.users.length===0){setNeedsOnboard(true)}}})()},[]);
  if(!authed)return html`<${AuthGate} onAuth=${()=>setAuthed(true)}/>`;
  const logout=()=>{setAdminKey('');setAuthed(false)};
  if(needsOnboard)return html`<${Onboarding} onComplete=${()=>setNeedsOnboard(false)}/>`;
  return html`<div class="shell"><nav class="nav">
    <div class="nav-brand" onClick=${()=>setActive('overview')}><span class="nav-brand-text">Stockyard</span></div>
    <div class="nav-divider"></div><div class="nav-section">Apps</div>
    ${APP_ORDER.map(id=>{const a=APPS[id];return html`<button key=${id} class="nav-item ${active===id?'active':''}" onClick=${()=>setActive(id)}><span class="nav-icon">${a.icon}</span><span class="nav-label">${a.name}</span></button>`})}
    <div class="nav-spacer"></div><div class="nav-divider"></div>
    <button class="nav-item ${active==='settings'?'active':''}" onClick=${()=>setActive('settings')}><span class="nav-icon">\u2699</span><span class="nav-label">Settings</span></button>
    <a class="nav-item" href="/api/apps" target="_blank"><span class="nav-icon">{}</span><span class="nav-label">Raw API</span></a>
    <a class="nav-item" href="https://stockyard.dev/docs" target="_blank"><span class="nav-icon">?</span><span class="nav-label">Docs</span></a>
    <button class="nav-item" onClick=${logout}><span class="nav-icon">\u23FB</span><span class="nav-label">Logout</span></button>
    <div class="nav-footer"><span class="nav-version">v1.0 \u00B7 6 apps \u00B7 69 endpoints</span></div>
  </nav><main class="content"><${View} key=${active}/></main></div>`;
}
render(html`<${App}/>`,document.getElementById('root'));
</script>

.wf-step-prompt{font-family:var(--font-mono);font-size:0.72rem;color:var(--cream-dim);margin-top:6px;padding:8px;background:var(--bg2);border-left:2px solid var(--bg3);white-space:pre-wrap;word-break:break-word;max-height:80px;overflow:hidden}
.run-step-result{background:var(--bg);border:1px solid var(--bg3);padding:12px;margin-bottom:8px}
.run-step-head{display:flex;align-items:center;gap:8px}
.chart-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.chart-card{background:var(--bg2);border:1px solid var(--bg3);padding:16px;transition:border-color 0.15s}.chart-card:hover{border-color:var(--leather)}.chart-title{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--cream-muted);margin-bottom:10px}
.chart-period{display:flex;align-items:center;gap:8px;margin-bottom:4px}.chart-period-label{font-family:var(--font-mono);font-size:0.72rem;color:var(--cream-muted)}
.onboard-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000}.onboard-box{background:var(--bg2);border:1px solid var(--bg3);width:520px;max-width:90vw;padding:32px}
.onboard-header{text-align:center;margin-bottom:24px}.onboard-steps{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--bg3);padding-bottom:16px}
.onboard-step{flex:1;display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:0.75rem;color:var(--cream-muted);padding:8px}.onboard-step.active{color:var(--rust-light)}.onboard-step.done{color:var(--green)}
.onboard-step-num{width:22px;height:22px;border-radius:11px;border:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}.onboard-step.active .onboard-step-num{border-color:var(--rust);color:var(--rust-light)}.onboard-step.done .onboard-step-num{border-color:var(--green);color:var(--green);background:rgba(90,154,74,0.1)}
.onboard-content{min-height:180px}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3)}::-webkit-scrollbar-thumb:hover{background:var(--leather)}
@media(max-width:900px){.nav{display:none}.stats-row{flex-wrap:wrap}.stats-row .stat{min-width:45%}.app-grid{grid-template-columns:1fr}.content{padding:24px 16px}.settings-layout{flex-direction:column}.settings-sidebar{width:100%;min-width:0}}
</style>
</head>
