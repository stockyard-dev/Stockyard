<html lang="en" data-product="__PRODUCT__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PRODUCT_NAME__ Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import{h,render}from'https://esm.sh/preact@10.19.3';import{useState,useEffect,useCallback}from'https://esm.sh/preact@10.19.3/hooks';import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

const APPS={
  overview:{id:'overview',name:'Overview',icon:'\u25A3',desc:'System status and health'},
  proxy:{id:'proxy',name:'Proxy',icon:'\u25C8',desc:'Middleware chain & providers',
    endpoints:{modules:'/api/proxy/modules',providers:'/api/proxy/providers',routes:'/api/proxy/routes',status:'/api/proxy/status'}},
  observe:{id:'observe',name:'Observe',icon:'\u25CE',desc:'Traces, costs & anomalies',
    endpoints:{overview:'/api/observe/overview',traces:'/api/observe/traces',costs:'/api/observe/costs',alerts:'/api/observe/alerts',anomalies:'/api/observe/anomalies'}},
  trust:{id:'trust',name:'Trust',icon:'\u2B21',desc:'Audit ledger & compliance',
    endpoints:{ledger:'/api/trust/ledger',verify:'/api/trust/ledger/verify',evidence:'/api/trust/evidence',policies:'/api/trust/policies',status:'/api/trust/status'}},
  studio:{id:'studio',name:'Studio',icon:'\u25C7',desc:'Prompts, experiments & benchmarks',
    endpoints:{templates:'/api/studio/templates',experiments:'/api/studio/experiments',benchmarks:'/api/studio/benchmarks',snapshots:'/api/studio/snapshots',status:'/api/studio/status'}},
  forge:{id:'forge',name:'Forge',icon:'\u2B22',desc:'Workflows, tools & sessions',
    endpoints:{workflows:'/api/forge/workflows',runs:'/api/forge/runs',tools:'/api/forge/tools',sessions:'/api/forge/sessions',status:'/api/forge/status'}},
  exchange:{id:'exchange',name:'Exchange',icon:'\u21C4',desc:'Packs, environments & sync',
    endpoints:{packs:'/api/exchange/packs',installed:'/api/exchange/installed',environments:'/api/exchange/environments',status:'/api/exchange/status'}},
};
const APP_ORDER=['overview','proxy','observe','trust','studio','forge','exchange'];

async function api(path){try{const r=await fetch(path);if(!r.ok)return{_error:r.status};return await r.json()}catch(e){return{_error:e.message}}}

const fmt={
  usd:v=>v==null?'\u2014':v<0.01&&v>0?'$'+v.toFixed(4):'$'+v.toFixed(2),
  num:v=>v==null?'\u2014':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(v),
  ms:v=>v==null?'\u2014':v>=1000?(v/1000).toFixed(1)+'s':Math.round(v)+'ms',
  ago:ts=>{if(!ts)return'\u2014';const s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'},
  trunc:(s,n=60)=>s&&s.length>n?s.substring(0,n)+'\u2026':s||'\u2014',
  hash:s=>s?s.substring(0,12)+'\u2026':'\u2014',
};

// ─── Components ────────────────────────────────────────────────────────
function Stat({label,value,sub,accent}){
  return html`<div class="stat"><div class="stat-label">${label}</div><div class="stat-value ${accent?'accent':''}">${value}</div>${sub&&html`<div class="stat-sub">${sub}</div>`}</div>`;
}

function Badge({text,variant}){return html`<span class="badge ${variant||''}">${text}</span>`}

function TabBar({tabs,active,onChange}){
  return html`<div class="tab-bar">${tabs.map(t=>html`<button key=${t} class="tab ${active===t?'active':''}" onClick=${()=>onChange(t)}>${t}</button>`)}</div>`;
}

function DataTable({columns,rows,emptyMsg}){
  if(!rows||rows.length===0)return html`<div class="empty-state">${emptyMsg||'No data yet.'}</div>`;
  const gc=columns.map(c=>c.width||'1fr').join(' ');
  return html`<div class="data-table">
    <div class="dt-head" style="grid-template-columns:${gc}">${columns.map(c=>html`<span key=${c.key}>${c.label}</span>`)}</div>
    <div class="dt-body">${rows.map((row,i)=>html`<div key=${row.id||i} class="dt-row" style="grid-template-columns:${gc}">
      ${columns.map(c=>html`<span key=${c.key} class="${c.mono?'mono':''} ${c.accent?'dt-accent':''}">${c.render?c.render(row):row[c.key]||'\u2014'}</span>`)}
    </div>`)}</div>
  </div>`;
}

// ─── Overview ──────────────────────────────────────────────────────────
function OverviewView(){
  const[apps,setApps]=useState(null);
  const[stats,setStats]=useState({});
  useEffect(()=>{(async()=>{
    const a=await api('/api/apps');setApps(a.apps||[]);
    const st={};
    for(const id of['proxy','observe','trust','studio','forge','exchange']){
      const ep=APPS[id]?.endpoints?.status;if(ep)st[id]=await api(ep);
    }
    setStats(st);
  })()},[]);
  if(!apps)return html`<div class="loading">Loading\u2026</div>`;
  return html`
    <div class="page-head">
      <div class="page-eyebrow">Console</div>
      <h2>System Overview</h2>
      <p class="page-sub">All 6 apps running on a single binary.</p>
    </div>
    <div class="stats-row">
      <${Stat} label="Apps" value=${apps.length} accent/>
      <${Stat} label="API Endpoints" value="69"/>
      <${Stat} label="Middleware" value="134"/>
      <${Stat} label="Status" value="Operational" accent/>
    </div>
    <div class="app-grid">${apps.map(a=>{const cfg=APPS[a.name];const st=stats[a.name]||{};
      return html`<div key=${a.name} class="app-card">
        <div class="app-card-head">
          <span class="app-card-icon">${cfg?.icon||'\u25C6'}</span>
          <span class="app-card-name">${a.name}</span>
          <${Badge} text=${st._error?'error':'live'} variant=${st._error?'danger':'success'}/>
        </div>
        <div class="app-card-desc">${a.description}</div>
        <code class="app-card-api">${a.api}</code>
      </div>`})}</div>`;
}

    <nav class="nav">
      <div class="nav-brand" onClick=${()=>setActive('overview')}>
        <span class="nav-brand-text">Stockyard</span>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-section">Apps</div>
      ${APP_ORDER.map(id=>{const a=APPS[id];return html`
        <button key=${id} class="nav-item ${active===id?'active':''}" onClick=${()=>setActive(id)}>
          <span class="nav-icon">${a.icon}</span><span class="nav-label">${a.name}</span>
        </button>`})}
      <div class="nav-spacer"></div>
      <div class="nav-divider"></div>
      <a class="nav-item" href="/api/apps" target="_blank"><span class="nav-icon">{}</span><span class="nav-label">Raw API</span></a>
      <a class="nav-item" href="https://stockyard.dev/docs" target="_blank"><span class="nav-icon">?</span><span class="nav-label">Docs</span></a>
      <div class="nav-footer"><span class="nav-version">v1.0 \u00B7 6 apps \u00B7 69 endpoints</span></div>
    </nav>
    <main class="content"><${View} key=${active}/></main>
  </div>`;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
<style>
:root{
  --bg:#1a1410;--bg2:#241e18;--bg3:#2e261e;
  --rust:#c45d2c;--rust-light:#e8753a;--rust-dark:#8b3d1a;
  --leather:#a0845c;--leather-light:#c4a87a;
  --cream:#f0e6d3;--cream-dim:#bfb5a3;--cream-muted:#7a7060;
  --gold:#d4a843;
  --green:#5a9a4a;--green-s:rgba(90,154,74,0.15);
  --red:#c44a3a;--red-s:rgba(196,74,58,0.15);
  --amber:#d4a843;--amber-s:rgba(212,168,67,0.15);
  --muted-s:rgba(160,132,92,0.1);
  --font-serif:'Libre Baskerville',Georgia,serif;
  --font-mono:'JetBrains Mono',monospace;
  --nav-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--cream);font-family:var(--font-serif);line-height:1.6;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--font-mono)}
code{font-family:var(--font-mono);font-size:0.85em}

/* ─── Shell ──────────────────────────────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ─── Nav ────────────────────────────────────────────────────────── */
.nav{width:var(--nav-w);min-width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--bg3);display:flex;flex-direction:column;padding:20px 12px;gap:2px;overflow-y:auto}
.nav-brand{padding:4px 10px 16px;cursor:pointer}
.nav-brand-text{font-family:var(--font-mono);font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--leather-light)}
.nav-divider{height:1px;background:var(--bg3);margin:4px 0 4px}
.nav-section{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:3px;color:var(--cream-muted);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;color:var(--cream-dim);font-family:var(--font-mono);font-size:0.8rem;font-weight:400;cursor:pointer;transition:all 0.15s;border:none;background:none;text-decoration:none;width:100%;text-align:left;position:relative}
.nav-item:hover{color:var(--cream);background:var(--bg3)}
.nav-item.active{color:var(--rust-light);background:rgba(196,93,44,0.08)}
.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--rust)}
.nav-icon{width:16px;text-align:center;font-size:0.9rem;flex-shrink:0}
.nav-label{letter-spacing:0.5px}
.nav-spacer{flex:1}
.nav-footer{padding:12px 10px 0;border-top:1px solid var(--bg3);margin-top:8px}
.nav-version{font-family:var(--font-mono);font-size:0.65rem;color:var(--cream-muted);letter-spacing:0.5px}

/* ─── Content ────────────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:32px 40px;display:flex;flex-direction:column;gap:24px}
.page-head{margin-bottom:4px}
.page-eyebrow{font-family:var(--font-mono);font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--rust);margin-bottom:8px}
.page-eyebrow::before{content:'';display:inline-block;width:24px;height:1px;background:var(--rust);margin-right:10px;vertical-align:middle}
.page-head h2{font-size:1.7rem;font-weight:700;line-height:1.2;margin-bottom:6px}
.page-sub{font-size:0.95rem;color:var(--cream-dim);font-style:italic}

/* ─── Stats ──────────────────────────────────────────────────────── */
.stats-row{display:flex;gap:12px}
.stat{flex:1;background:var(--bg2);border:1px solid var(--bg3);padding:18px 20px;transition:border-color 0.15s}
.stat:hover{border-color:var(--leather)}
.stat-label{font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--cream-muted);margin-bottom:6px}
.stat-value{font-family:var(--font-mono);font-size:1.8rem;font-weight:600;letter-spacing:-0.02em;color:var(--cream);line-height:1.1}
.stat-value.accent{color:var(--rust-light)}
.stat-sub{font-size:0.78rem;color:var(--cream-muted);margin-top:4px;font-style:italic}

/* ─── Tabs ───────────────────────────────────────────────────────── */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--bg3)}
.tab{padding:8px 18px;border:none;background:transparent;color:var(--cream-dim);font-family:var(--font-mono);font-size:0.78rem;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;text-transform:capitalize;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--cream)}
.tab.active{color:var(--rust-light);border-bottom-color:var(--rust)}

/* ─── Data table ─────────────────────────────────────────────────── */
.data-table{background:var(--bg2);border:1px solid var(--bg3);overflow:hidden}
.dt-head{display:grid;padding:10px 20px;font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--cream-muted);border-bottom:1px solid var(--bg3);background:var(--bg)}
.dt-body{max-height:480px;overflow-y:auto}
.dt-row{display:grid;padding:10px 20px;font-size:0.85rem;align-items:center;border-bottom:1px solid var(--bg3);transition:background 0.1s;cursor:default}
.dt-row:last-child{border-bottom:none}
.dt-row:hover{background:rgba(46,38,30,0.5)}
.dt-row .mono{font-family:var(--font-mono);font-size:0.78rem}
.dt-accent{color:var(--gold)!important;font-weight:600}

/* ─── Badge ──────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 8px;font-family:var(--font-mono);font-size:0.65rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.badge.success{background:var(--green-s);color:var(--green)}
.badge.warn{background:var(--amber-s);color:var(--amber)}
.badge.danger{background:var(--red-s);color:var(--red)}
.badge.muted{background:var(--muted-s);color:var(--cream-muted)}
.badge:not(.success):not(.warn):not(.danger):not(.muted){background:rgba(196,93,44,0.12);color:var(--rust-light)}

/* ─── App cards ──────────────────────────────────────────────────── */
.app-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.app-card{background:var(--bg2);border:1px solid var(--bg3);padding:20px;transition:all 0.15s;position:relative}
.app-card:hover{border-color:var(--leather)}
.app-card-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.app-card-icon{font-size:1rem;width:18px;text-align:center;color:var(--leather-light)}
.app-card-name{font-family:var(--font-mono);font-weight:600;font-size:0.85rem;letter-spacing:1px;text-transform:capitalize;color:var(--cream)}
.app-card-desc{font-size:0.82rem;color:var(--cream-dim);margin-bottom:10px;font-style:italic}
.app-card-api{font-size:0.72rem;color:var(--cream-muted)}

/* ─── Empty / loading ────────────────────────────────────────────── */
.empty-state{background:var(--bg2);border:1px solid var(--bg3);padding:48px 24px;text-align:center;color:var(--cream-dim);font-size:0.9rem;font-style:italic}
.loading{padding:48px;text-align:center;color:var(--cream-dim);font-size:0.9rem;font-style:italic}

/* ─── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--leather)}

/* ─── Responsive ─────────────────────────────────────────────────── */
@media(max-width:900px){.nav{display:none}.stats-row{flex-wrap:wrap}.stats-row .stat{min-width:45%}.app-grid{grid-template-columns:1fr}.content{padding:24px 16px}}
</style>
</head>
<body><div id="root"></div></body>
</html>
