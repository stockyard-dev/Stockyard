# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: stockyard

before:
  hooks:
    - go mod tidy
    - go test ./internal/license/ ./internal/storage/ -count=1

builds:
  - id: stockyard
    main: ./cmd/stockyard
    binary: stockyard
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: sy-api
    main: ./cmd/sy-api
    binary: sy-api
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: sy-keygen
    main: ./cmd/sy-keygen
    binary: sy-keygen
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: stockyard
    builds: [stockyard]
    name_template: "stockyard_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: tools
    builds: [sy-api, sy-keygen]
    name_template: "stockyard-tools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^site:"
      - "^test:"
      - "^chore:"

brews:
  - name: stockyard
    ids: [stockyard]
    repository:
      owner: stockyard-dev
      name: homebrew-tap
    homepage: "https://stockyard.dev"
    description: "LLM proxy platform — 6 apps, 58 modules, one binary"
    license: "MIT"
    install: |
      bin.install "stockyard"
    test: |
      assert_match "stockyard", shell_output("#{bin}/stockyard --version")

dockers:
  - image_templates:
      - "ghcr.io/stockyard-dev/stockyard:{{ .Version }}"
      - "ghcr.io/stockyard-dev/stockyard:latest"
    ids: [stockyard]
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.source=https://github.com/stockyard-dev/stockyard"
      - "--label=org.opencontainers.image.version={{.Version}}"

release:
  github:
    owner: stockyard-dev
    name: stockyard
  draft: false
  prerelease: auto
  name_template: "Stockyard v{{.Version}}"
  header: |
    ## What's new

    Six apps. One binary. Zero dependencies.
    See the [changelog](https://stockyard.dev/changelog/) for details.
  footer: |
    ---
    **Quick install:** `curl -sSL stockyard.dev/install | sh`
    **Docker:** `docker run -p 4200:4200 ghcr.io/stockyard-dev/stockyard:{{.Version}}`
    **Docs:** https://stockyard.dev/docs/
