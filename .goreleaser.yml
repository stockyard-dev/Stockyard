# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: stockyard

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1

builds:
  - id: costcap
    main: ./cmd/costcap
    binary: costcap
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      &ldflags
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: llmcache
    main: ./cmd/llmcache
    binary: llmcache
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
