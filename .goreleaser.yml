checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "📝 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: stockyard-dev
    name: stockyard
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Stockyard v{{.Version}} — 20 Products + 3 Tools

    Install any product in 10 seconds:
    ```bash
    npx @stockyard/costcap      # or any of 20 products
    brew install stockyard-dev/tap/costcap
    docker run ghcr.io/stockyard-dev/costcap
    ```
  footer: |
    **Full Changelog**: https://github.com/stockyard-dev/stockyard/compare/{{ .PreviousTag }}...{{ .Tag }}
