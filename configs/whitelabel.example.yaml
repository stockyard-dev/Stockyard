# WhiteLabel — Your brand on Stockyard's engine.
# Copy to whitelabel.yaml and set your API keys.

port: 5970
whitelabel:
  brand_name: "YourBrand AI"
  logo_url: "/assets/your-logo.svg"
  primary_color: "#3B82F6"
  accent_color: "#10B981"
  custom_domain: "ai.yourbrand.com"

# Common settings
data_dir: ~/.stockyard
log_level: info
