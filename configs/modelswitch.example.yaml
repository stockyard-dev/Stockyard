# ModelSwitch — Smart Model Routing
# Route every request to the right model automatically.

port: 4900
data_dir: ~/.stockyard
log_level: info

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    timeout: 30s
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    timeout: 60s

modelswitch:
  enabled: true
  default_model: gpt-4o-mini

  rules:
    - name: short_prompts
      condition: "token_count < 200"
      route_to: gpt-4o-mini

    - name: code_generation
      condition: "prompt_contains(write code|implement|function|debug)"
      route_to: claude-sonnet-4-20250514
      provider: anthropic

    - name: complex_reasoning
      condition: "token_count > 2000"
      route_to: gpt-4o

    - name: embeddings
      condition: "endpoint == /v1/embeddings"
      route_to: text-embedding-3-small

projects:
  default:
    provider: openai
    model: gpt-4o-mini
