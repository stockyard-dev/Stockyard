# DriftWatch — Detect model behavior changes before users notice.
# Copy to driftwatch.yaml and set your API keys.

port: 5760
providers:
  openai:
    api_key: ${OPENAI_API_KEY}
driftwatch:
  schedule: "0 */6 * * *"  # every 6 hours
  baselines:
    - prompt: "What is 2+2?"
      expect_contains: "4"
    - prompt: "Write a haiku about coding."
      expect_min_length: 30
  alert_webhook: ""

# Common settings
data_dir: ~/.stockyard
log_level: info
