# MirrorTest — Shadow test new models against production.
# Copy to mirrortest.yaml and set your API keys.

port: 6070
providers:
  openai:
    api_key: ${OPENAI_API_KEY}
mirror:
  primary: gpt-4o
  shadow: gpt-4o-mini
  shadow_percent: 10  # test 10% of traffic
  log_comparison: true

# Common settings
data_dir: ~/.stockyard
log_level: info
