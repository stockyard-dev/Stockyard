# TokenMarket — Reallocate unused API capacity across teams.
# Copy to tokenmarket.yaml and set your API keys.

port: 6030
providers:
  openai:
    api_key: ${OPENAI_API_KEY}
tokenmarket:
  pools:
    engineering: { budget: 100000, priority: high }
    marketing: { budget: 50000, priority: medium }
    support: { budget: 25000, priority: low }
  rebalance_interval: 1h

# Common settings
data_dir: ~/.stockyard
log_level: info
