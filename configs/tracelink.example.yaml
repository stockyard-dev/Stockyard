# TraceLink — Distributed tracing for multi-step LLM chains
# W3C traceparent + custom header propagation with waterfall views
# Theme: cyan #1ABC9C

port: 5630
data_dir: ~/.stockyard

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    timeout: 30s

tracelink:
  enabled: true

  # Sampling rate (0.0 = none, 1.0 = all requests)
  sample_rate: 1.0

  # Propagate W3C traceparent headers for interop with other tracing systems
  propagate_w3c: true

  # Service name shown in traces (your app name)
  service_name: my-app

  # Maximum traces to keep in memory (oldest evicted first)
  max_spans: 10000

  # Optional: export to OpenTelemetry collector
  # export_otlp: http://localhost:4318/v1/traces

logging:
  store_bodies: false
  retention_days: 7
