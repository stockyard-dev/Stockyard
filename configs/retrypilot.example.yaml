# RetryPilot — Intelligent Retry Engine
port: 5500
data_dir: ~/.stockyard
providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    timeout: 30s
retrypilot:
  enabled: true
  max_retries: 3
  backoff: exponential
  base_delay: 1s
  max_delay: 30s
  jitter: full
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 60s
    half_open_requests: 2
  deadline:
    enabled: true
    min_remaining: 5s
  downgrade:
    enabled: true
    after_failures: 2
    downgrade_map:
      gpt-4o: gpt-4o-mini
      claude-sonnet-4-20250514: claude-haiku-4-5-20251001
  budget:
    max_retries_per_minute: 30
projects:
  default:
    provider: openai
    model: gpt-4o-mini
