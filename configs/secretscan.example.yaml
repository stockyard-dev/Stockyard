# SecretScan — Catch API keys and secrets leaking in requests and responses
# TruffleHog-style regex detection with masked previews
# Theme: black/gold #F39C12

port: 5620
data_dir: ~/.stockyard

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    timeout: 30s

secretscan:
  enabled: true

  # Scan directions
  scan_input: true    # Scan user messages for accidentally pasted secrets
  scan_output: true   # Scan LLM responses for leaked secrets from training data

  # Action on detection: block, redact, alert
  action: redact

  # Show first 4 + last 4 characters in masked preview (AKIA...MPLE)
  mask_preview: true

  # Built-in patterns to enable (all available patterns below)
  patterns:
    - aws_key          # AKIA... AWS access key IDs
    - aws_secret       # AWS secret access keys
    - github_pat       # ghp_... GitHub personal access tokens
    - github_token     # github_pat_... fine-grained tokens
    - stripe_key       # sk_live_... / sk_test_... Stripe keys
    - openai_key       # sk-...T3BlbkFJ... OpenAI API keys
    - anthropic_key    # sk-ant-... Anthropic API keys
    - gcp_key          # AIza... Google Cloud API keys
    - azure_key        # Azure subscription keys
    - slack_token      # xoxb-/xoxp-/xoxa-... Slack tokens
    - jwt              # eyJ... JSON Web Tokens
    - private_key      # -----BEGIN PRIVATE KEY-----
    - generic_secret   # api_key=, secret_key=, auth_token= patterns

  # Custom detection patterns
  custom:
    - name: internal_token
      pattern: "\\binternal-[a-f0-9]{32}\\b"
      severity: high

  # Optional webhook for real-time alerts
  # webhook: https://hooks.slack.com/services/YOUR/WEBHOOK/URL

logging:
  store_bodies: true
  retention_days: 30
