# Stockyard — Run any product (or all of them) with Docker Compose
#
# Single product:  docker compose up costcap
# Full suite:      docker compose up stockyard
# All products:    docker compose up
#
# Required: Set OPENAI_API_KEY (and optionally ANTHROPIC_API_KEY, GROQ_API_KEY, GEMINI_API_KEY)

x-common-env: &common-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}

services:
  # ── Original 7 ──────────────────────────────────────────────────────
  costcap:
    build: { context: ., args: { PRODUCT: costcap } }
    image: ghcr.io/stockyard-dev/costcap:latest
    ports: ["4100:4100"]
    environment: *common-env
    volumes: [costcap-data:/data]

  llmcache:
    build: { context: ., args: { PRODUCT: llmcache } }
    image: ghcr.io/stockyard-dev/llmcache:latest
    ports: ["4200:4200"]
    environment: *common-env
    volumes: [llmcache-data:/data]

  jsonguard:
    build: { context: ., args: { PRODUCT: jsonguard } }
    image: ghcr.io/stockyard-dev/jsonguard:latest
    ports: ["4300:4300"]
    environment: *common-env
    volumes: [jsonguard-data:/data]

  routefall:
    build: { context: ., args: { PRODUCT: routefall } }
