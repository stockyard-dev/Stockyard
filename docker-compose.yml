# Docker Compose for local development and quick start.
# Usage: docker compose up
services:
  stockyard:
    build: .
    ports:
      - "4200:4200"
    volumes:
      - stockyard-data:/data
    environment:
      - PORT=4200
      - STOCKYARD_DATA_DIR=/data
      - STOCKYARD_ADMIN_KEY=${STOCKYARD_ADMIN_KEY:-}
      - STOCKYARD_LICENSE_KEY=${STOCKYARD_LICENSE_KEY:-}
      # Provider keys (set in .env or export before running)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # OTEL export (optional)
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-stockyard}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "stockyard", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  stockyard-data:
